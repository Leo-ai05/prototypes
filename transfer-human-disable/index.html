<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>全局配置 - 转人工禁用规则配置原型</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;background:#f0f2f5;color:#303133;font-size:14px}
.app{display:flex;height:100vh}
.sidebar{width:200px;background:#001529;color:#fff;flex-shrink:0;display:flex;flex-direction:column}
.sidebar h1{font-size:16px;padding:20px 16px;border-bottom:1px solid rgba(255,255,255,.1);font-weight:600}
.nav-item{padding:12px 16px 12px 24px;cursor:pointer;transition:background .2s;font-size:13px;color:rgba(255,255,255,.65)}
.nav-item:hover{background:rgba(255,255,255,.08)}
.nav-item.active{background:#1890ff;color:#fff}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{height:48px;background:#fff;border-bottom:1px solid #e8e8e8;display:flex;align-items:center;padding:0 20px;font-size:13px;color:#999}
.topbar .crumb span{color:#409eff;cursor:pointer}
.content{flex:1;overflow-y:auto;padding:20px}
.config-section{background:#fff;border-radius:8px;padding:20px;margin-bottom:16px;box-shadow:0 1px 3px rgba(0,0,0,.05)}
.section-header{display:flex;align-items:center;margin-bottom:16px}
.section-indicator{width:4px;height:16px;background:#409eff;border-radius:2px;margin-right:8px}
.section-title{font-size:16px;font-weight:600;color:#303133}
.section-content{padding-left:12px}
.desc-text{font-size:14px;color:#606266;margin-bottom:8px;line-height:1.6}
.form-row{display:flex;align-items:center;flex-wrap:wrap;gap:8px;font-size:14px;color:#606266;margin-bottom:12px}
.time-picker{border:1px solid #dcdfe6;border-radius:4px;padding:6px 12px;font-size:14px;width:140px;outline:none}
.time-picker:disabled{background:#f5f7fa;color:#c0c4cc;cursor:not-allowed}
.btn{padding:8px 20px;border-radius:4px;border:none;cursor:pointer;font-size:14px;transition:all .2s}
.btn-primary{background:#409eff;color:#fff}
.btn-primary:hover{background:#66b1ff}
.switch-wrap{display:flex;align-items:center;gap:12px;margin-bottom:12px}
.switch{width:44px;height:22px;border-radius:11px;background:#dcdfe6;position:relative;cursor:pointer;transition:background .3s;flex-shrink:0}
.switch.on{background:#409eff}
.switch .dot{width:18px;height:18px;border-radius:50%;background:#fff;position:absolute;top:2px;left:2px;transition:left .3s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.switch.on .dot{left:24px}
.switch-label{font-size:14px;color:#303133;font-weight:500}
.switch-status{font-size:12px;padding:2px 8px;border-radius:3px;margin-left:4px}
.switch-status.on{background:#f0f9eb;color:#67c23a}
.switch-status.off{background:#fef0f0;color:#f56c6c}
.tip-text{font-size:12px;color:#909399;margin-top:8px;line-height:1.6;padding:8px 12px;background:#fdf6ec;border-radius:4px;border-left:3px solid #e6a23c}
.info-text{font-size:12px;color:#909399;margin-top:8px;line-height:1.6;padding:8px 12px;background:#ecf5ff;border-radius:4px;border-left:3px solid #409eff}
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);padding:10px 20px;border-radius:6px;font-size:14px;z-index:2000;animation:toastIn .3s ease;background:#f0f9eb;color:#67c23a;border:1px solid #e1f3d8}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(-10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
.page-indicator{position:fixed;bottom:20px;right:20px;background:#409eff;color:#fff;padding:8px 16px;border-radius:20px;font-size:12px;box-shadow:0 2px 12px rgba(64,158,255,.4)}
.scenario-tabs{display:flex;border-bottom:2px solid #ebeef5;margin-bottom:20px}
.scenario-tab{padding:10px 20px;cursor:pointer;font-size:13px;color:#606266;border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .2s;white-space:nowrap}
.scenario-tab.active{color:#409eff;border-bottom-color:#409eff;font-weight:500}
.scenario-tab:hover{color:#409eff}
.example-block{background:#f8f9fb;border-radius:6px;padding:16px;margin-top:16px;border:1px solid #ebeef5}
.example-title{font-size:13px;font-weight:600;color:#606266;margin-bottom:10px}
.example-row{display:flex;align-items:center;gap:6px;font-size:12px;color:#606266;padding:6px 0;border-bottom:1px dashed #ebeef5;flex-wrap:wrap}
.example-row:last-child{border-bottom:none}
.tag{font-size:11px;padding:2px 6px;border-radius:3px;white-space:nowrap}
.tag-human{background:#fef0f0;color:#f56c6c}
.tag-ai{background:#ecf5ff;color:#409eff}
.tag-skip{background:#fdf6ec;color:#e6a23c}
.tag-fire{background:#f0f9eb;color:#67c23a}
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <h1>企微机器人</h1>
    <div class="nav-item">AI员工明细</div>
    <div class="nav-item">规则配置</div>
    <div class="nav-item">会话属性</div>
    <div class="nav-item active">全局配置</div>
  </aside>
  <div class="main">
    <div class="topbar"><div class="crumb"><span>企微机器人</span> / 全局配置</div></div>
    <div class="content" id="content"></div>
  </div>
</div>
<div id="toast-container"></div>
<div class="page-indicator" id="indicator"></div>

<script>
var S = { sc:'off', on:false };

function toast(m){ var c=document.getElementById('toast-container'); c.innerHTML='<div class="toast">'+m+'</div>'; setTimeout(function(){c.innerHTML='';},2500); }

function setScene(s){
  S.sc=s;
  S.on = (s!=='off');
  render();
}

function toggle(){ S.on=!S.on; render(); }

function render(){
  var c=document.getElementById('content');
  var ind=document.getElementById('indicator');
  var labels={
    'off':'开关关闭 — 所有会话正常触发（当前默认行为）',
    'on':'开关开启 — 转人工会话跳过所有规则触发',
    'example':'触发判断示例'
  };
  ind.textContent='当前场景：'+(labels[S.sc]||'');

  c.innerHTML=
    '<div class="scenario-tabs">'+
      tab('off','开关关闭')+tab('on','开关开启')+tab('example','触发判断示例')+
    '</div>'+
    configHtml()+
    (S.sc==='example'?exampleHtml():'');
}

function tab(id,label){ return '<div class="scenario-tab '+(S.sc===id?'active':'')+'" onclick="setScene(\''+id+'\')">'+label+'</div>'; }

function configHtml(){
  var on=S.on;
  return ''+
  '<div class="config-section">'+
    '<div class="section-header"><div class="section-indicator"></div><span class="section-title">转人工禁用规则配置</span></div>'+
    '<div class="section-content">'+
      '<div class="desc-text">当会话处于「转人工」状态时，是否禁止规则引擎对该会话触发规则。开启后，所有处于人工接待状态的会话将不再被规则命中和执行。</div>'+
      '<div class="switch-wrap">'+
        '<div class="switch '+(on?'on':'')+'" onclick="toggle()"><div class="dot"></div></div>'+
        '<span class="switch-label">转人工状态禁用规则</span>'+
        '<span class="switch-status '+(on?'on':'off')+'">'+(on?'已开启':'未开启')+'</span>'+
      '</div>'+
      (on?
        '<div class="tip-text">⚠️ 已开启：当会话的「转人工」状态变量为转人工时，该会话的所有规则触发（用户信息变更触发、定时触发）将被跳过，不执行任何动作（不发消息、不更新变量）。当会话切回 AI 托管后，规则自动恢复触发。</div>'
      :
        '<div class="info-text">ℹ️ 未开启：规则引擎不判断会话的转人工状态，所有会话均按规则条件正常触发。</div>'
      )+
    '</div>'+
  '</div>'+
  '<div class="config-section">'+
    '<div class="section-header"><div class="section-indicator"></div><span class="section-title">触发器全局规则</span></div>'+
    '<div class="section-content">'+
      '<div class="desc-text" style="margin-bottom:12px">触发时间:</div>'+
      '<div class="form-row">'+
        '<span>若触发器命中时间范围为</span>'+
        '<input type="text" class="time-picker" value="22:00:00">'+
        '<span>-</span>'+
        '<input type="text" class="time-picker" value="08:00:00">'+
        '<span>顺延至</span>'+
        '<input type="text" class="time-picker" value="08:30:00" style="width:160px">'+
        '<span>触发</span>'+
      '</div>'+
    '</div>'+
  '</div>'+
  '<div style="margin-top:24px"><button class="btn btn-primary" onclick="toast(\'保存配置成功\')">保存配置</button></div>';
}

function exampleHtml(){
  return '<div class="example-block">'+
    '<div class="example-title">开关已开启时的触发判断示例</div>'+
    r('tag-ai','AI托管','张小明','规则「试听课结束发消息」命中','tag-fire','正常触发','立即发送','#67c23a')+
    r('tag-human','转人工','李家长','规则「试听课结束发消息」命中','tag-skip','跳过触发','不发送','#e6a23c')+
    r('tag-human','转人工','王同学','定时规则「每日9点学习提醒」命中','tag-skip','跳过触发','不发送','#e6a23c')+
    r('tag-ai','AI托管','赵同学','定时规则「每日9点学习提醒」命中','tag-fire','正常触发','立即发送','#67c23a')+
    r('tag-ai','切回AI','李家长 → 人工服务结束，切回AI','后续规则重新命中','tag-fire','恢复触发','正常执行','#67c23a')+
  '</div>';
}
function r(t1,s1,name,rule,t2,s2,result,color){
  return '<div class="example-row">'+
    '<span class="tag '+t1+'">'+s1+'</span>'+
    '<span>'+name+' →</span>'+
    '<span>'+rule+' →</span>'+
    '<span class="tag '+t2+'">'+s2+'</span>'+
    '<span style="color:'+color+'">'+result+'</span>'+
  '</div>';
}
render();
</script>
</body>
</html>
