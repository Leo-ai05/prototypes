<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>会话属性镜像画像 - 可交互原型 v1.1</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;background:#f5f7fa;color:#303133;font-size:14px}
.app{display:flex;min-height:100vh}
.sidebar{width:220px;background:#1d1e1f;color:#fff;flex-shrink:0}
.sidebar-logo{padding:20px 16px;font-size:16px;font-weight:600;border-bottom:1px solid #333}
.sidebar-menu{padding:8px 0}
.sidebar-item{padding:12px 20px;cursor:pointer;font-size:14px;color:#bbb;transition:all .2s}
.sidebar-item:hover,.sidebar-item.active{background:#409eff;color:#fff}
.sidebar-sub{padding-left:40px}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.header{height:50px;background:#fff;border-bottom:1px solid #e4e7ed;display:flex;align-items:center;padding:0 20px}
.header-title{font-size:16px;font-weight:500}

.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:4px;border:1px solid #dcdfe6;cursor:pointer;font-size:14px;transition:all .2s;background:#fff}
.btn-primary{background:#409eff;color:#fff;border-color:#409eff}
.btn-primary:hover{background:#66b1ff}
.btn-sm{padding:5px 12px;font-size:12px}
.btn-text{background:none;border:none;color:#409eff;padding:4px 8px;cursor:pointer}

.tag{display:inline-block;padding:2px 10px;border-radius:4px;font-size:12px}
.tag-success{background:#f0f9eb;color:#67c23a;border:1px solid #e1f3d8}
.tag-warning{background:#fdf6ec;color:#e6a23c;border:1px solid #f5dab1}
.tag-info{background:#f4f4f5;color:#909399;border:1px solid #d3d4d6}
.tag-primary{background:#ecf5ff;color:#409eff;border:1px solid #b3d8ff}

.table{width:100%;border-collapse:collapse}
.table th,.table td{padding:10px 14px;text-align:left;border-bottom:1px solid #ebeef5;font-size:13px}
.table th{background:#fafafa;font-weight:500;color:#909399;font-size:12px}
.table tr:hover td{background:#f5f7fa}
.table tr.default-row td{color:#c0c4cc}

.card{background:#fff;border-radius:8px;box-shadow:0 1px 3px rgba(0,0,0,.08);margin-bottom:16px;overflow:hidden}
.card-header{padding:16px 20px;border-bottom:1px solid #ebeef5;display:flex;align-items:center;justify-content:space-between}
.card-body{padding:20px}
.section-title{font-size:16px;font-weight:500;margin-bottom:16px;padding-left:10px;border-left:4px solid #409eff}

.ai-layout{display:flex;height:calc(100vh - 50px);background:#f5f5f5}
.ai-panel{display:flex;flex-direction:column;background:#fff;border-right:1px solid #e5e5e5}
.ai-panel-left{width:240px;flex-shrink:0}
.ai-panel-mid{width:300px;flex-shrink:0}
.ai-panel-right{flex:1;min-width:0;display:flex;flex-direction:column;background:#fff}
.ai-panel-title{padding:14px 16px;border-bottom:1px solid #e5e5e5;font-weight:600;font-size:15px}
.ai-list{flex:1;overflow-y:auto}
.ai-list-item{display:flex;align-items:center;padding:12px 16px;cursor:pointer;transition:background .2s;border-bottom:1px solid #f5f5f5}
.ai-list-item:hover{background:#f5f5f5}
.ai-list-item.active{background:#e6f7ff}
.ai-avatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;color:#fff;flex-shrink:0;font-weight:500}
.ai-item-info{margin-left:10px;flex:1;min-width:0}
.ai-item-name{font-weight:500;font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ai-item-meta{font-size:11px;color:#999;margin-top:2px}

.ai-tabs{display:flex;border-bottom:1px solid #e5e5e5;flex-shrink:0}
.ai-tab{padding:0 16px;height:40px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:13px;color:#666;white-space:nowrap;position:relative}
.ai-tab.active{color:#409eff;font-weight:500}
.ai-tab.active::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:#409eff}
.ai-tab:not(.active):hover{color:#409eff}
.ai-tab-content{flex:1;overflow-y:auto;padding:16px}

.mirror-info{display:flex;align-items:center;gap:16px;padding:14px 16px;background:#f0f9ff;border:1px solid #b3d8ff;border-radius:8px;margin-bottom:16px;flex-wrap:wrap}
.mirror-info-item{display:flex;align-items:center;gap:6px;font-size:13px}
.mirror-info-label{color:#909399}
.mirror-info-value{font-weight:500;color:#303133}

.filter-bar{display:flex;align-items:center;gap:12px;margin-bottom:12px}
.checkbox-label{display:flex;align-items:center;gap:4px;font-size:13px;cursor:pointer;color:#606266}
.checkbox{width:16px;height:16px;accent-color:#409eff}

.mirror-card{border:1px solid #e4e7ed;border-radius:8px;margin-bottom:12px;overflow:hidden;transition:all .3s}
.mirror-card:hover{box-shadow:0 2px 8px rgba(0,0,0,.06)}
.mirror-card-header{padding:12px 16px;background:#fafbfc;display:flex;align-items:center;justify-content:space-between;cursor:pointer}
.mirror-card-header:hover{background:#f0f2f5}
.mirror-card-left{display:flex;align-items:center;gap:12px}
.mirror-card-right{display:flex;align-items:center;gap:12px}
.mirror-card-body{border-top:1px solid #f0f0f0;animation:slideDown .3s}
@keyframes slideDown{from{opacity:0}to{opacity:1}}
.expand-arrow{transition:transform .3s;color:#c0c4cc;font-size:12px}
.expand-arrow.expanded{transform:rotate(180deg)}

.isolate-badge{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;background:#ecf5ff;border:1px solid #b3d8ff;border-radius:12px;font-size:11px;color:#409eff;font-weight:500}

.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);padding:12px 24px;border-radius:8px;color:#fff;font-size:14px;z-index:9999;animation:fadeIn .3s}
.toast-success{background:#67c23a}
.toast-warning{background:#e6a23c}
@keyframes fadeIn{from{opacity:0;transform:translateX(-50%) translateY(-10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}

.view-hidden{display:none!important}
.text-gray{color:#909399}.text-sm{font-size:12px}
</style>
</head>
<body>

<div class="app">
  <div class="sidebar">
    <div class="sidebar-logo">CRM 管理后台</div>
    <div class="sidebar-menu">
      <div class="sidebar-item">工作台</div>
      <div class="sidebar-item">客户管理</div>
      <div class="sidebar-item active">企微机器人</div>
      <div class="sidebar-item sidebar-sub">会话属性</div>
      <div class="sidebar-item sidebar-sub">规则引擎</div>
      <div class="sidebar-item sidebar-sub" id="nav-ai" style="background:#409eff;color:#fff" onclick="switchView('ai')">AI员工明细</div>
      <div class="sidebar-item sidebar-sub" id="nav-mirror" onclick="switchView('mirror')">镜像管理</div>
      <div class="sidebar-item sidebar-sub">全局配置</div>
      <div class="sidebar-item">积分商城</div>
    </div>
  </div>

  <div class="main">
    <div id="view-ai">
      <div class="header"><span class="header-title">AI员工明细</span></div>
      <div class="ai-layout">
        <div class="ai-panel ai-panel-left">
          <div class="ai-panel-title">AI员工列表</div>
          <div class="ai-list" id="ai-employee-list"></div>
        </div>
        <div class="ai-panel ai-panel-mid">
          <div class="ai-panel-title">会话列表</div>
          <div class="ai-list" id="ai-session-list"></div>
        </div>
        <div class="ai-panel-right">
          <div id="ai-placeholder" style="flex:1;display:flex;align-items:center;justify-content:center;color:#909399">请选择会话查看详情</div>
          <div id="ai-detail" class="view-hidden" style="flex:1;display:flex;flex-direction:column">
            <div style="padding:12px 16px;border-bottom:1px solid #e5e5e5;font-weight:500;font-size:15px" id="ai-session-title">用户会话</div>
            <div class="ai-tabs">
              <div class="ai-tab" onclick="switchTab('chat')">聊天记录</div>
              <div class="ai-tab" onclick="switchTab('vars')">会话变量</div>
              <div class="ai-tab active" onclick="switchTab('mirror')" id="tab-mirror">镜像画像</div>
            </div>
            <div class="ai-tab-content view-hidden" id="content-chat">
              <div style="text-align:center;padding:40px;color:#909399">💬 聊天记录区域</div>
            </div>
            <div class="ai-tab-content view-hidden" id="content-vars">
              <div style="text-align:center;padding:40px;color:#909399">📋 会话变量区域</div>
            </div>
            <div class="ai-tab-content" id="content-mirror"></div>
          </div>
        </div>
      </div>
    </div>

    <div id="view-mirror" class="view-hidden">
      <div class="header"><span class="header-title">镜像管理 — 用户画像镜像列表</span></div>
      <div style="flex:1;padding:20px;overflow-y:auto" id="mirror-manage-content"></div>
    </div>
  </div>
</div>

<script>
const COLORS = ['#409eff','#67c23a','#e6a23c','#f56c6c','#9b59b6','#1abc9c'];
const ATTR_FIELDS = ['跟进阶段','用户来源','会员状态','注册天数','最近活跃天数','购买次数','意向等级','课程类型'];
const DEFAULTS = {'跟进阶段':'初始','用户来源':'','会员状态':'未开通','注册天数':'0','最近活跃天数':'0','购买次数':'0','意向等级':'低','课程类型':''};

const employees = [
  {id:'e1',name:'销售A',avatar:'A',color:COLORS[0],phone:'企微-001'},
  {id:'e2',name:'销售B',avatar:'B',color:COLORS[1],phone:'企微-002'},
  {id:'e3',name:'客服C',avatar:'C',color:COLORS[2],phone:'企微-003'}
];

const sessions = [
  {id:'s1',nickname:'张小明',remark:'抖音-张小明',lastMsg:'你好',time:'10:25'},
  {id:'s2',nickname:'李萌萌',remark:'',lastMsg:'什么时候有优惠？',time:'09:48'},
  {id:'s3',nickname:'王大锤',remark:'老客户-王大锤',lastMsg:'续费咋操作',time:'昨天'}
];

const mirrorData = {
  'e1': {
    accountName:'销售A', accountColor:COLORS[0], friendStatus:'正常',
    createdAt:'2026-04-10 09:00', updatedAt:'2026-04-22 10:30',
    attrs: {
      '跟进阶段':{val:'已报价',modified:'2026-04-22 10:30',source:'规则自动修改',count:3},
      '用户来源':{val:'抖音',modified:'2026-04-15 11:00',source:'规则自动修改',count:1},
      '会员状态':{val:'试用中',modified:'2026-04-18 14:00',source:'规则自动修改',count:2},
      '注册天数':{val:'0',modified:null,source:'默认初始化',count:0},
      '最近活跃天数':{val:'2',modified:'2026-04-22 09:00',source:'规则自动修改',count:5},
      '购买次数':{val:'0',modified:null,source:'默认初始化',count:0},
      '意向等级':{val:'高',modified:'2026-04-20 16:00',source:'手动修改',count:2},
      '课程类型':{val:'基础班',modified:'2026-04-19 10:00',source:'规则自动修改',count:1}
    }
  },
  'e2': {
    accountName:'销售B', accountColor:COLORS[1], friendStatus:'正常',
    createdAt:'2026-04-12 11:00', updatedAt:'2026-04-21 15:20',
    attrs: {
      '跟进阶段':{val:'需求确认',modified:'2026-04-21 15:20',source:'规则自动修改',count:2},
      '用户来源':{val:'微信',modified:'2026-04-14 09:00',source:'规则自动修改',count:1},
      '会员状态':{val:'未开通',modified:null,source:'默认初始化',count:0},
      '注册天数':{val:'0',modified:null,source:'默认初始化',count:0},
      '最近活跃天数':{val:'0',modified:null,source:'默认初始化',count:0},
      '购买次数':{val:'2',modified:'2026-04-19 10:00',source:'规则自动修改',count:1},
      '意向等级':{val:'低',modified:null,source:'默认初始化',count:0},
      '课程类型':{val:'进阶班',modified:'2026-04-20 09:30',source:'规则自动修改',count:1}
    }
  },
  'e3': {
    accountName:'客服C', accountColor:COLORS[2], friendStatus:'已删除',
    createdAt:'2026-04-05 14:00', updatedAt:'2026-04-15 08:00',
    attrs: {
      '跟进阶段':{val:'初始',modified:null,source:'默认初始化',count:0},
      '用户来源':{val:'',modified:null,source:'默认初始化',count:0},
      '会员状态':{val:'未开通',modified:null,source:'默认初始化',count:0},
      '注册天数':{val:'0',modified:null,source:'默认初始化',count:0},
      '最近活跃天数':{val:'0',modified:null,source:'默认初始化',count:0},
      '购买次数':{val:'0',modified:null,source:'默认初始化',count:0},
      '意向等级':{val:'低',modified:null,source:'默认初始化',count:0},
      '课程类型':{val:'',modified:null,source:'默认初始化',count:0}
    }
  }
};

let selectedEmployee = 'e1';
let selectedSession = null;
let showModifiedOnly = false;
let expandedMirrors = new Set();

function getModifiedCount(empId) {
  const m = mirrorData[empId]; if (!m) return 0;
  let c = 0; for (const k in m.attrs) if (m.attrs[k].count > 0) c++;
  return c;
}

function isDefault(empId, key) {
  const m = mirrorData[empId]; return m && m.attrs[key] && m.attrs[key].count === 0;
}

function switchView(v) {
  document.getElementById('view-ai').classList.toggle('view-hidden', v !== 'ai');
  document.getElementById('view-mirror').classList.toggle('view-hidden', v !== 'mirror');
  document.getElementById('nav-ai').style.background = v === 'ai' ? '#409eff' : '';
  document.getElementById('nav-ai').style.color = v === 'ai' ? '#fff' : '#bbb';
  document.getElementById('nav-mirror').style.background = v === 'mirror' ? '#409eff' : '';
  document.getElementById('nav-mirror').style.color = v === 'mirror' ? '#fff' : '#bbb';
  if (v === 'mirror') renderMirrorManage();
  if (v === 'ai') { renderEmployeeList(); renderSessionList(); }
}

function renderEmployeeList() {
  document.getElementById('ai-employee-list').innerHTML = employees.map(e =>
    `<div class="ai-list-item ${e.id===selectedEmployee?'active':''}" onclick="selectEmployee('${e.id}')">
      <div class="ai-avatar" style="background:${e.color}">${e.avatar}</div>
      <div class="ai-item-info"><div class="ai-item-name">${e.name}</div><div class="ai-item-meta">${e.phone}</div></div>
    </div>`
  ).join('');
}

function selectEmployee(id) {
  selectedEmployee = id; selectedSession = null;
  renderEmployeeList(); renderSessionList();
  document.getElementById('ai-placeholder').classList.remove('view-hidden');
  document.getElementById('ai-detail').classList.add('view-hidden');
}

function renderSessionList() {
  const list = document.getElementById('ai-session-list');
  if (!selectedEmployee) { list.innerHTML = '<div style="padding:40px;text-align:center;color:#999">请先选择AI员工</div>'; return; }
  list.innerHTML = sessions.map(s =>
    `<div class="ai-list-item ${s.id===selectedSession?'active':''}" onclick="selectSession('${s.id}')">
      <div class="ai-avatar" style="background:#67c23a;font-size:13px">${s.nickname[0]}</div>
      <div class="ai-item-info">
        <div class="ai-item-name">${s.nickname}${s.remark?'（'+s.remark+'）':''}</div>
        <div class="ai-item-meta" style="display:flex;justify-content:space-between"><span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1">${s.lastMsg}</span><span style="flex-shrink:0;margin-left:8px">${s.time}</span></div>
      </div>
    </div>`
  ).join('');
}

function selectSession(id) {
  selectedSession = id;
  const s = sessions.find(x => x.id === id);
  renderSessionList();
  document.getElementById('ai-placeholder').classList.add('view-hidden');
  document.getElementById('ai-detail').classList.remove('view-hidden');
  document.getElementById('ai-session-title').textContent = `${s.nickname}${s.remark?'（'+s.remark+'）':''}`;
  showModifiedOnly = false;
  switchTab('mirror');
}

function switchTab(tab) {
  document.querySelectorAll('.ai-tab').forEach(t => t.classList.remove('active'));
  ['chat','vars','mirror'].forEach(t => document.getElementById('content-'+t).classList.add('view-hidden'));
  if (tab === 'chat') document.querySelectorAll('.ai-tab')[0].classList.add('active');
  else if (tab === 'vars') document.querySelectorAll('.ai-tab')[1].classList.add('active');
  else { document.getElementById('tab-mirror').classList.add('active'); renderMirrorTab(); }
  document.getElementById('content-'+tab).classList.remove('view-hidden');
}

function renderMirrorTab() {
  const container = document.getElementById('content-mirror');
  const m = mirrorData[selectedEmployee];
  if (!m) { container.innerHTML = '<div style="text-align:center;padding:40px;color:#909399">无镜像数据</div>'; return; }

  const modCount = getModifiedCount(selectedEmployee);
  const totalCount = ATTR_FIELDS.length;

  let html = `
    <div class="mirror-info">
      <div class="mirror-info-item"><span class="mirror-info-label">企微账号：</span><span class="mirror-info-value">${m.accountName}</span></div>
      <div class="mirror-info-item"><span class="mirror-info-label">创建时间：</span><span class="mirror-info-value">${m.createdAt}</span></div>
      <div class="mirror-info-item"><span class="mirror-info-label">最后更新：</span><span class="mirror-info-value">${m.updatedAt}</span></div>
      <div class="mirror-info-item"><span class="isolate-badge">🔒 独立画像 · 与其他账号完全隔离</span></div>
    </div>
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px;font-size:13px;color:#606266">
      <span>已修改 <strong style="color:#409eff">${modCount}</strong> / ${totalCount} 个属性</span>
      <span style="color:#dcdfe6">|</span>
      <span>默认值 <strong style="color:#c0c4cc">${totalCount - modCount}</strong> 个</span>
    </div>
    <div class="filter-bar">
      <label class="checkbox-label"><input type="checkbox" class="checkbox" ${showModifiedOnly?'checked':''} onchange="showModifiedOnly=this.checked;renderMirrorTab()"> 仅显示已修改</label>
    </div>
    <table class="table">
      <thead><tr><th>属性名称</th><th>当前值</th><th width="80">状态</th><th width="130">最后修改</th><th width="100">修改来源</th><th width="60">修改次数</th></tr></thead>
      <tbody>`;

  ATTR_FIELDS.forEach(key => {
    const a = m.attrs[key];
    if (!a) return;
    const isDef = a.count === 0;
    if (showModifiedOnly && isDef) return;
    html += `<tr class="${isDef?'default-row':''}">
      <td style="font-weight:500;${isDef?'color:#c0c4cc':''}">${key}</td>
      <td>${isDef ? '<span style="color:#c0c4cc">'+(a.val||'(空)')+'</span>' : '<span style="font-weight:500">'+a.val+'</span>'}</td>
      <td>${isDef ? '<span class="tag tag-info">默认</span>' : '<span class="tag tag-primary">已修改</span>'}</td>
      <td class="text-sm text-gray">${a.modified || '-'}</td>
      <td class="text-sm text-gray">${a.source}</td>
      <td style="text-align:center;${isDef?'color:#c0c4cc':'font-weight:500'}">${a.count}</td>
    </tr>`;
  });
  html += '</tbody></table>';
  container.innerHTML = html;
}

function renderMirrorManage() {
  const container = document.getElementById('mirror-manage-content');
  let html = `
    <div class="card"><div class="card-header">
      <div><span class="section-title" style="margin-bottom:0">用户「张小明」的镜像画像列表</span></div>
      <span class="isolate-badge">🔒 各账号画像完全独立，互不干扰</span>
    </div><div class="card-body">
    <div class="mirror-info" style="margin-bottom:16px">
      <div class="mirror-info-item"><span class="mirror-info-label">镜像数量：</span><span class="mirror-info-value">${Object.keys(mirrorData).length} 个</span></div>
      <div class="mirror-info-item"><span class="mirror-info-label">属性字段：</span><span class="mirror-info-value">${ATTR_FIELDS.length} 个</span></div>
      <div class="mirror-info-item"><span class="mirror-info-label">创建方式：</span><span class="mirror-info-value">全新画像（默认值初始化）</span></div>
    </div>`;

  for (const empId in mirrorData) {
    const m = mirrorData[empId];
    const emp = employees.find(e => e.id === empId);
    const modCount = getModifiedCount(empId);
    const isExpanded = expandedMirrors.has(empId);
    const isDeleted = m.friendStatus === '已删除';

    html += `<div class="mirror-card">
      <div class="mirror-card-header" onclick="toggleMirrorCard('${empId}')">
        <div class="mirror-card-left">
          <div class="ai-avatar" style="background:${m.accountColor};width:32px;height:32px;font-size:13px;${isDeleted?'opacity:.5':''}">${emp?.avatar||'?'}</div>
          <div>
            <div style="font-weight:500;font-size:13px;${isDeleted?'color:#909399':''}">${m.accountName}</div>
            <div style="font-size:11px;color:#909399">创建于 ${m.createdAt} · 最后更新 ${m.updatedAt}</div>
          </div>
          ${isDeleted?'<span class="tag tag-info">好友已删除</span>':'<span class="tag tag-success">正常</span>'}
        </div>
        <div class="mirror-card-right">
          <span style="font-size:12px;color:${modCount>0?'#409eff':'#c0c4cc'};font-weight:500">已修改 ${modCount}/${ATTR_FIELDS.length}</span>
          <span class="expand-arrow ${isExpanded?'expanded':''}">▼</span>
        </div>
      </div>`;

    if (isExpanded) {
      html += `<div class="mirror-card-body"><div style="padding:12px 16px">
        <table class="table">
          <thead><tr><th>属性名称</th><th>当前值</th><th width="80">状态</th><th width="130">最后修改</th><th width="100">修改来源</th><th width="60">修改次数</th></tr></thead>
          <tbody>`;
      ATTR_FIELDS.forEach(key => {
        const a = m.attrs[key]; if (!a) return;
        const isDef = a.count === 0;
        html += `<tr class="${isDef?'default-row':''}">
          <td style="font-weight:500;${isDef?'color:#c0c4cc':''}">${key}</td>
          <td>${isDef ? '<span style="color:#c0c4cc">'+(a.val||'(空)')+'</span>' : '<span style="font-weight:500">'+a.val+'</span>'}</td>
          <td>${isDef ? '<span class="tag tag-info">默认</span>' : '<span class="tag tag-primary">已修改</span>'}</td>
          <td class="text-sm text-gray">${a.modified || '-'}</td>
          <td class="text-sm text-gray">${a.source}</td>
          <td style="text-align:center;${isDef?'color:#c0c4cc':'font-weight:500'}">${a.count}</td>
        </tr>`;
      });
      html += '</tbody></table></div></div>';
    }
    html += '</div>';
  }
  html += '</div></div>';
  container.innerHTML = html;
}

function toggleMirrorCard(empId) {
  if (expandedMirrors.has(empId)) expandedMirrors.delete(empId);
  else expandedMirrors.add(empId);
  renderMirrorManage();
}

renderEmployeeList();
renderSessionList();
</script>
</body>
</html>
