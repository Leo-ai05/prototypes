<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IM对话框 - 短信验证码身份核验原型</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Helvetica Neue', Arial, sans-serif; background: #f5f5f5; height: 100vh; display: flex; justify-content: center; align-items: center; }

.chat-window {
  width: 420px; height: 700px; background: #EFF6FC; border-radius: 12px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.12); display: flex; flex-direction: column; overflow: hidden;
}

/* 顶部栏 */
.chat-header {
  background: #2CABFB; color: white; padding: 16px 20px; display: flex; align-items: center; gap: 12px; flex-shrink: 0;
}
.chat-header .avatar {
  width: 36px; height: 36px; border-radius: 50%; background: rgba(255,255,255,0.25);
  display: flex; align-items: center; justify-content: center; font-size: 18px;
}
.chat-header .info { flex: 1; }
.chat-header .name { font-size: 15px; font-weight: 500; }
.chat-header .status { font-size: 12px; opacity: 0.8; margin-top: 2px; }
.chat-header .close-btn { cursor: pointer; font-size: 20px; opacity: 0.7; transition: opacity .2s; }
.chat-header .close-btn:hover { opacity: 1; }

/* 消息区域 */
.chat-body {
  flex: 1; overflow-y: auto; padding: 16px 12px; display: flex; flex-direction: column; gap: 12px;
  scroll-behavior: smooth;
}
.chat-body::-webkit-scrollbar { width: 4px; }
.chat-body::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.15); border-radius: 2px; }

/* 时间标签 */
.time-label {
  text-align: center; margin: 4px 0;
}
.time-label span {
  background: #D3E7FB; color: white; font-size: 12px; padding: 2px 8px; border-radius: 3px;
}

/* 消息行 */
.msg-row { display: flex; max-width: 100%; }
.msg-row.me { justify-content: flex-end; }
.msg-row.other { justify-content: flex-start; }

/* 消息气泡 */
.msg-bubble {
  max-width: 80%; padding: 10px; border-radius: 8px; font-size: 15px;
  position: relative; word-break: break-word; line-height: 1.5;
}
.msg-row.me .msg-bubble {
  background: #2CABFB; color: white; margin-right: 20px;
}
.msg-row.me .msg-bubble::after {
  content: ''; position: absolute; right: -12px; top: 10px;
  border-top: 6px solid transparent; border-right: 6px solid transparent;
  border-left: 6px solid #2CABFB; border-bottom: 6px solid transparent;
}
.msg-row.other .msg-bubble {
  background: white; color: #333; margin-left: 20px;
}
.msg-row.other .msg-bubble::after {
  content: ''; position: absolute; left: -12px; top: 10px;
  border-top: 6px solid transparent; border-right: 6px solid white;
  border-left: 6px solid transparent; border-bottom: 6px solid transparent;
}

/* 短信验证卡片 */
.verify-card {
  max-width: 85%; margin-left: 20px; background: white; border-radius: 12px;
  overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.06);
}
.verify-card-header {
  background: linear-gradient(135deg, #2CABFB 0%, #1E90D6 100%); color: white;
  padding: 14px 16px; display: flex; align-items: center; gap: 10px;
}
.verify-card-header .icon {
  width: 32px; height: 32px; background: rgba(255,255,255,0.2); border-radius: 8px;
  display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0;
}
.verify-card-header .title { font-size: 14px; font-weight: 500; }
.verify-card-header .desc { font-size: 12px; opacity: 0.85; margin-top: 2px; }

.verify-card-body { padding: 16px; }
.verify-card-body .phone-info {
  display: flex; align-items: center; gap: 8px; padding: 10px 12px;
  background: #F5FBFF; border-radius: 8px; margin-bottom: 14px; font-size: 13px; color: #666;
}
.verify-card-body .phone-info .phone-icon { font-size: 16px; }
.verify-card-body .phone-info .phone-num { color: #333; font-weight: 500; }

.code-input-area { display: flex; gap: 8px; margin-bottom: 12px; }
.code-boxes { display: flex; gap: 6px; flex: 1; }
.code-box {
  width: 40px; height: 44px; border: 1.5px solid #E0E0E0; border-radius: 8px;
  text-align: center; font-size: 20px; font-weight: 600; color: #333;
  outline: none; transition: border-color .2s; caret-color: #2CABFB;
}
.code-box:focus { border-color: #2CABFB; box-shadow: 0 0 0 2px rgba(44,171,251,0.15); }
.code-box.filled { border-color: #2CABFB; background: #F5FBFF; }
.code-box.error { border-color: #F56C6C; background: #FEF0F0; }
.code-box.success { border-color: #67C23A; background: #F0F9EB; }

.resend-btn {
  white-space: nowrap; padding: 0 14px; height: 44px; border-radius: 8px;
  border: 1px solid #2CABFB; background: white; color: #2CABFB; font-size: 13px;
  cursor: pointer; transition: all .2s; display: flex; align-items: center;
}
.resend-btn:hover:not(:disabled) { background: #F5FBFF; }
.resend-btn:disabled { border-color: #ccc; color: #999; cursor: not-allowed; }

.verify-submit-btn {
  width: 100%; height: 40px; border-radius: 8px; border: none;
  background: #2CABFB; color: white; font-size: 14px; font-weight: 500;
  cursor: pointer; transition: all .2s; display: flex; align-items: center; justify-content: center; gap: 6px;
}
.verify-submit-btn:hover:not(:disabled) { background: #1E9AE8; }
.verify-submit-btn:disabled { background: #B8DFFA; cursor: not-allowed; }

.verify-tip { font-size: 12px; color: #999; margin-top: 10px; text-align: center; }
.verify-tip.error { color: #F56C6C; }
.verify-tip.success { color: #67C23A; }

/* 验证成功卡片 */
.verify-success-card {
  max-width: 85%; margin-left: 20px; background: white; border-radius: 12px;
  overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.06); padding: 20px;
  text-align: center;
}
.success-icon { font-size: 48px; margin-bottom: 10px; }
.success-title { font-size: 15px; font-weight: 500; color: #333; margin-bottom: 4px; }
.success-desc { font-size: 13px; color: #999; }

/* 验证失败卡片 */
.verify-fail-card {
  max-width: 85%; margin-left: 20px; background: white; border-radius: 12px;
  overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.06); padding: 20px;
  text-align: center;
}
.fail-icon { font-size: 48px; margin-bottom: 10px; }
.fail-title { font-size: 15px; font-weight: 500; color: #333; margin-bottom: 4px; }
.fail-desc { font-size: 13px; color: #999; margin-bottom: 14px; }
.retry-btn {
  padding: 8px 28px; border-radius: 8px; border: 1px solid #2CABFB;
  background: white; color: #2CABFB; font-size: 13px; cursor: pointer; transition: all .2s;
}
.retry-btn:hover { background: #F5FBFF; }

/* 过期卡片 */
.verify-expired-card {
  max-width: 85%; margin-left: 20px; background: white; border-radius: 12px;
  overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  opacity: 0.7; position: relative;
}
.expired-overlay {
  position: absolute; inset: 0; background: rgba(255,255,255,0.6);
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; color: #999; font-weight: 500;
}

/* 底部输入 */
.chat-footer {
  padding: 12px 16px; background: white; border-top: 1px solid #E8F0F8; flex-shrink: 0;
}
.input-area {
  display: flex; gap: 10px; align-items: flex-end;
}
.input-area textarea {
  flex: 1; border: 1px solid #DCDFE6; border-radius: 8px; padding: 10px 12px;
  font-size: 14px; resize: none; outline: none; font-family: inherit;
  min-height: 38px; max-height: 80px; transition: border-color .2s;
}
.input-area textarea:focus { border-color: #2CABFB; }
.send-btn {
  padding: 8px 20px; background: #2CABFB; color: white; border: none;
  border-radius: 8px; font-size: 14px; cursor: pointer; transition: background .2s;
  white-space: nowrap; height: 38px;
}
.send-btn:hover { background: #1E9AE8; }
.toolbar { display: flex; gap: 16px; margin-bottom: 8px; }
.toolbar-btn { background: none; border: none; font-size: 18px; cursor: pointer; opacity: 0.5; transition: opacity .2s; }
.toolbar-btn:hover { opacity: 0.8; }

/* 场景切换面板 */
.scenario-panel {
  position: fixed; top: 20px; right: 20px; background: white; border-radius: 12px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.12); padding: 20px; width: 260px; z-index: 100;
}
.scenario-panel h3 { font-size: 14px; color: #333; margin-bottom: 14px; display: flex; align-items: center; gap: 6px; }
.scenario-btn {
  display: block; width: 100%; padding: 10px 14px; margin-bottom: 8px;
  border: 1px solid #E0E0E0; border-radius: 8px; background: white;
  text-align: left; cursor: pointer; font-size: 13px; color: #333; transition: all .2s;
}
.scenario-btn:hover { border-color: #2CABFB; background: #F5FBFF; }
.scenario-btn.active { border-color: #2CABFB; background: #F5FBFF; color: #2CABFB; }
.scenario-btn .label { font-weight: 500; }
.scenario-btn .hint { font-size: 11px; color: #999; margin-top: 3px; }

/* 动画 */
@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}
.fade-in { animation: fadeInUp 0.35s ease-out; }

@keyframes shake {
  0%, 100% { transform: translateX(0); }
  20%, 60% { transform: translateX(-4px); }
  40%, 80% { transform: translateX(4px); }
}
.shake { animation: shake 0.4s ease-out; }

@keyframes pulse {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.05); }
}

/* 打字指示器 */
.typing-indicator {
  display: flex; gap: 4px; padding: 10px; margin-left: 20px; background: white;
  border-radius: 8px; width: fit-content; position: relative;
}
.typing-indicator::after {
  content: ''; position: absolute; left: -12px; top: 10px;
  border-top: 6px solid transparent; border-right: 6px solid white;
  border-left: 6px solid transparent; border-bottom: 6px solid transparent;
}
.typing-dot {
  width: 7px; height: 7px; background: #B0B0B0; border-radius: 50%;
  animation: typingBounce 1.2s ease-in-out infinite;
}
.typing-dot:nth-child(2) { animation-delay: 0.2s; }
.typing-dot:nth-child(3) { animation-delay: 0.4s; }
@keyframes typingBounce {
  0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
  30% { transform: translateY(-6px); opacity: 1; }
}

/* 进度条 */
.progress-bar {
  height: 3px; background: #E8F0F8; border-radius: 2px; margin-top: 10px; overflow: hidden;
}
.progress-fill {
  height: 100%; background: #2CABFB; border-radius: 2px; transition: width 0.3s ease;
}

/* 响应式 */
@media (max-width: 500px) {
  .chat-window { width: 100%; height: 100vh; border-radius: 0; }
  .scenario-panel { position: fixed; bottom: 0; top: auto; right: 0; left: 0; width: 100%; border-radius: 12px 12px 0 0; }
}
</style>
</head>
<body>

<div class="chat-window" id="chatWindow">
  <div class="chat-header">
    <div class="avatar">🤖</div>
    <div class="info">
      <div class="name">智能客服助手</div>
      <div class="status">在线服务中</div>
    </div>
    <div class="close-btn" title="关闭">✕</div>
  </div>

  <div class="chat-body" id="chatBody"></div>

  <div class="chat-footer">
    <div class="toolbar">
      <button class="toolbar-btn" title="表情">😊</button>
      <button class="toolbar-btn" title="图片">🖼️</button>
      <button class="toolbar-btn" title="文件">📎</button>
    </div>
    <div class="input-area">
      <textarea id="userInput" placeholder="输入消息..." rows="1" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();handleUserSend()}"></textarea>
      <button class="send-btn" onclick="handleUserSend()">发送</button>
    </div>
  </div>
</div>

<div class="scenario-panel" id="scenarioPanel">
  <h3>🎬 场景演示</h3>
  <button class="scenario-btn active" onclick="runScenario('normal')" id="btnNormal">
    <div class="label">✅ 验证成功流程</div>
    <div class="hint">输入正确验证码 → 核验通过</div>
  </button>
  <button class="scenario-btn" onclick="runScenario('wrong')" id="btnWrong">
    <div class="label">❌ 验证码错误</div>
    <div class="hint">输入错误验证码 → 提示重试</div>
  </button>
  <button class="scenario-btn" onclick="runScenario('expired')" id="btnExpired">
    <div class="label">⏰ 验证码过期</div>
    <div class="hint">超时未验证 → 卡片失效</div>
  </button>
  <button class="scenario-btn" onclick="runScenario('resend')" id="btnResend">
    <div class="label">🔄 重新发送</div>
    <div class="hint">重新获取验证码 → 刷新卡片</div>
  </button>
  <button class="scenario-btn" onclick="resetChat()" style="border-color:#F56C6C; color:#F56C6C; margin-top:4px;">
    <div class="label">🗑️ 重置对话</div>
    <div class="hint">清空所有消息重新开始</div>
  </button>
</div>

<script>
const chatBody = document.getElementById('chatBody');
let countdown = 0;
let countdownTimer = null;
let currentScenario = 'normal';
let verifyCardActive = false;

function scrollToBottom() {
  setTimeout(() => { chatBody.scrollTop = chatBody.scrollHeight; }, 50);
}

function addTimeLabel(text) {
  const div = document.createElement('div');
  div.className = 'time-label fade-in';
  div.innerHTML = `<span>${text}</span>`;
  chatBody.appendChild(div);
}

function addMessage(side, text, extraClass) {
  const row = document.createElement('div');
  row.className = `msg-row ${side} fade-in ${extraClass || ''}`;
  row.innerHTML = `<div class="msg-bubble">${text}</div>`;
  chatBody.appendChild(row);
  scrollToBottom();
}

function addTyping() {
  const div = document.createElement('div');
  div.className = 'msg-row other fade-in';
  div.id = 'typingIndicator';
  div.innerHTML = `<div class="typing-indicator"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div>`;
  chatBody.appendChild(div);
  scrollToBottom();
}

function removeTyping() {
  const el = document.getElementById('typingIndicator');
  if (el) el.remove();
}

function addVerifyCard(phone, isExpired) {
  verifyCardActive = !isExpired;
  const row = document.createElement('div');
  row.className = 'msg-row other fade-in';
  row.id = 'verifyCardRow';

  if (isExpired) {
    row.innerHTML = `
      <div class="verify-expired-card">
        <div class="verify-card">
          <div class="verify-card-header">
            <div class="icon">🔐</div>
            <div><div class="title">短信验证码身份核验</div><div class="desc">请输入您收到的 6 位验证码</div></div>
          </div>
          <div class="verify-card-body">
            <div class="phone-info"><span class="phone-icon">📱</span><span>验证码已发送至 <span class="phone-num">${phone}</span></span></div>
            <div class="code-input-area">
              <div class="code-boxes">${Array(6).fill('<input class="code-box" maxlength="1" disabled>').join('')}</div>
            </div>
          </div>
        </div>
        <div class="expired-overlay">⏰ 验证码已过期</div>
      </div>`;
  } else {
    row.innerHTML = `
      <div class="verify-card" id="verifyCard">
        <div class="verify-card-header">
          <div class="icon">🔐</div>
          <div><div class="title">短信验证码身份核验</div><div class="desc">请输入您收到的 6 位验证码</div></div>
        </div>
        <div class="verify-card-body">
          <div class="phone-info"><span class="phone-icon">📱</span><span>验证码已发送至 <span class="phone-num">${phone}</span></span></div>
          <div class="code-input-area">
            <div class="code-boxes" id="codeBoxes">
              ${Array(6).fill(0).map((_, i) => `<input class="code-box" id="code${i}" maxlength="1" oninput="onCodeInput(this, ${i})" onkeydown="onCodeKeydown(event, ${i})" onfocus="this.select()">`).join('')}
            </div>
            <button class="resend-btn" id="resendBtn" onclick="handleResend()">获取验证码</button>
          </div>
          <button class="verify-submit-btn" id="submitBtn" onclick="handleVerifySubmit()" disabled>
            <span>验 证</span>
          </button>
          <div class="verify-tip" id="verifyTip">验证码 5 分钟内有效，请勿泄露给他人</div>
          <div class="progress-bar" id="progressBar" style="display:none;"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
        </div>
      </div>`;
  }

  chatBody.appendChild(row);
  scrollToBottom();

  if (!isExpired) {
    setTimeout(() => { const c0 = document.getElementById('code0'); if (c0) c0.focus(); }, 100);
    startResendCountdown();
  }
}

function onCodeInput(el, idx) {
  el.value = el.value.replace(/\D/g, '');
  if (el.value && idx < 5) {
    document.getElementById(`code${idx + 1}`).focus();
  }
  updateCodeState();
  checkAllFilled();
}

function onCodeKeydown(e, idx) {
  if (e.key === 'Backspace' && !e.target.value && idx > 0) {
    document.getElementById(`code${idx - 1}`).focus();
  }
}

function updateCodeState() {
  for (let i = 0; i < 6; i++) {
    const box = document.getElementById(`code${i}`);
    if (!box) return;
    box.classList.toggle('filled', !!box.value);
    box.classList.remove('error', 'success');
  }
}

function checkAllFilled() {
  const code = getCode();
  const btn = document.getElementById('submitBtn');
  if (btn) btn.disabled = code.length < 6;
}

function getCode() {
  let code = '';
  for (let i = 0; i < 6; i++) {
    const box = document.getElementById(`code${i}`);
    if (box) code += box.value;
  }
  return code;
}

function startResendCountdown() {
  countdown = 60;
  const btn = document.getElementById('resendBtn');
  if (!btn) return;
  btn.disabled = true;
  btn.textContent = `${countdown}s`;
  countdownTimer = setInterval(() => {
    countdown--;
    if (countdown <= 0) {
      clearInterval(countdownTimer);
      btn.disabled = false;
      btn.textContent = '重新发送';
    } else {
      btn.textContent = `${countdown}s`;
    }
  }, 1000);
}

function handleResend() {
  addMessage('other', '验证码已重新发送，请注意查收短信 📩');
  startResendCountdown();
  for (let i = 0; i < 6; i++) {
    const box = document.getElementById(`code${i}`);
    if (box) { box.value = ''; box.classList.remove('filled', 'error', 'success'); }
  }
  const tip = document.getElementById('verifyTip');
  if (tip) { tip.textContent = '新验证码已发送，5 分钟内有效'; tip.className = 'verify-tip'; }
  document.getElementById('code0')?.focus();
}

function handleVerifySubmit() {
  const code = getCode();
  if (code.length < 6) return;

  const btn = document.getElementById('submitBtn');
  btn.disabled = true;
  btn.innerHTML = '<span>验证中...</span>';

  const progress = document.getElementById('progressBar');
  const fill = document.getElementById('progressFill');
  progress.style.display = 'block';

  let pct = 0;
  const pTimer = setInterval(() => {
    pct += 15;
    fill.style.width = Math.min(pct, 90) + '%';
    if (pct >= 90) clearInterval(pTimer);
  }, 100);

  setTimeout(() => {
    clearInterval(pTimer);
    fill.style.width = '100%';

    setTimeout(() => {
      if (currentScenario === 'wrong') {
        showVerifyError();
      } else {
        showVerifySuccess();
      }
    }, 300);
  }, 1200);
}

function showVerifySuccess() {
  for (let i = 0; i < 6; i++) {
    const box = document.getElementById(`code${i}`);
    if (box) { box.classList.add('success'); box.disabled = true; }
  }
  const tip = document.getElementById('verifyTip');
  tip.textContent = '✅ 身份核验通过';
  tip.className = 'verify-tip success';

  const btn = document.getElementById('submitBtn');
  btn.innerHTML = '<span>✅ 验证成功</span>';
  btn.style.background = '#67C23A';

  const resend = document.getElementById('resendBtn');
  if (resend) resend.style.display = 'none';

  if (countdownTimer) clearInterval(countdownTimer);
  verifyCardActive = false;

  setTimeout(() => {
    addSuccessCard();
    setTimeout(() => {
      addMessage('other', '身份核验已通过，正在为您查询相关信息，请稍候... ⏳');
      setTimeout(() => {
        addMessage('other', '已查询到您的订单信息：<br><br>📦 订单编号：SN20260427001<br>📅 下单时间：2026-04-25<br>📍 物流状态：<span style="color:#67C23A;font-weight:500">配送中</span><br>🚚 预计送达：2026-04-28');
      }, 1500);
    }, 800);
  }, 600);
}

function addSuccessCard() {
  const row = document.createElement('div');
  row.className = 'msg-row other fade-in';
  row.innerHTML = `
    <div class="verify-success-card">
      <div class="success-icon">🎉</div>
      <div class="success-title">身份核验通过</div>
      <div class="success-desc">已确认您的身份，可以继续为您服务</div>
    </div>`;
  chatBody.appendChild(row);
  scrollToBottom();
}

function showVerifyError() {
  const boxes = document.getElementById('codeBoxes');
  boxes.classList.add('shake');
  setTimeout(() => boxes.classList.remove('shake'), 500);

  for (let i = 0; i < 6; i++) {
    const box = document.getElementById(`code${i}`);
    if (box) { box.classList.add('error'); box.value = ''; }
  }

  const tip = document.getElementById('verifyTip');
  tip.textContent = '❌ 验证码错误，请重新输入';
  tip.className = 'verify-tip error';

  const btn = document.getElementById('submitBtn');
  btn.disabled = true;
  btn.innerHTML = '<span>验 证</span>';
  btn.style.background = '';

  const progress = document.getElementById('progressBar');
  progress.style.display = 'none';

  setTimeout(() => {
    for (let i = 0; i < 6; i++) {
      const box = document.getElementById(`code${i}`);
      if (box) box.classList.remove('error');
    }
    document.getElementById('code0')?.focus();
  }, 1500);
}

function handleUserSend() {
  const input = document.getElementById('userInput');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  addMessage('me', text);
}

function resetChat() {
  chatBody.innerHTML = '';
  if (countdownTimer) clearInterval(countdownTimer);
  verifyCardActive = false;
  document.querySelectorAll('.scenario-btn').forEach(b => b.classList.remove('active'));
}

async function delay(ms) {
  return new Promise(resolve => setTimeout(resolve, ms));
}

async function runScenario(type) {
  resetChat();
  currentScenario = type;

  document.querySelectorAll('.scenario-btn').forEach(b => b.classList.remove('active'));
  const btnMap = { normal: 'btnNormal', wrong: 'btnWrong', expired: 'btnExpired', resend: 'btnResend' };
  document.getElementById(btnMap[type])?.classList.add('active');

  const phone = '138****6789';

  addTimeLabel('今天 14:32');
  await delay(300);

  addMessage('me', '你好，我想查一下我的订单物流信息');
  await delay(800);

  addTyping();
  await delay(1000);
  removeTyping();

  addMessage('other', '您好！为了保护您的账户安全，查询订单信息需要先进行身份核验。我将向您的手机号发送一条短信验证码，请您配合完成验证 🔒');
  await delay(1000);

  addTyping();
  await delay(800);
  removeTyping();

  addMessage('other', `检测到您绑定的手机号为 <b>${phone}</b>，验证码已发送，请查收短信 📲`);
  await delay(600);

  if (type === 'expired') {
    addVerifyCard(phone, true);
    await delay(800);
    addMessage('other', '抱歉，验证码已过期，请点击下方按钮重新获取验证码。');
    await delay(500);

    const row = document.createElement('div');
    row.className = 'msg-row other fade-in';
    row.innerHTML = `
      <div style="margin-left:20px;">
        <button onclick="runScenario('normal')" style="padding:8px 20px;border-radius:8px;border:1px solid #2CABFB;background:#F5FBFF;color:#2CABFB;font-size:13px;cursor:pointer;">🔄 重新发送验证码</button>
      </div>`;
    chatBody.appendChild(row);
    scrollToBottom();
  } else if (type === 'resend') {
    addVerifyCard(phone, false);
    await delay(2000);
    addMessage('me', '我没有收到验证码');
    await delay(800);
    addTyping();
    await delay(600);
    removeTyping();
    addMessage('other', '验证码已重新发送至您的手机，请稍等片刻后查看 📩');
    startResendCountdown();
  } else {
    addVerifyCard(phone, false);

    if (type === 'normal') {
      await delay(1500);
      for (let i = 0; i < 6; i++) {
        const box = document.getElementById(`code${i}`);
        if (box) {
          box.value = '385926'[i];
          box.classList.add('filled');
          await delay(120);
        }
      }
      checkAllFilled();
    } else if (type === 'wrong') {
      await delay(1500);
      for (let i = 0; i < 6; i++) {
        const box = document.getElementById(`code${i}`);
        if (box) {
          box.value = '123456'[i];
          box.classList.add('filled');
          await delay(120);
        }
      }
      checkAllFilled();
    }
  }
}

runScenario('normal');
</script>
