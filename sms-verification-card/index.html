<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IM短信验证码身份核验 - 用户端 + 客服后台原型</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Helvetica Neue', Arial, sans-serif; background: #f0f2f5; min-height: 100vh; }

/* ====== 视图切换 Tab ====== */
.view-tabs {
  position: fixed; top: 0; left: 0; right: 0; z-index: 200;
  background: white; border-bottom: 1px solid #e4e7ed; display: flex; align-items: center;
  padding: 0 24px; height: 48px; box-shadow: 0 1px 4px rgba(0,0,0,0.06);
}
.view-tabs .tab-title { font-size: 14px; color: #666; margin-right: 24px; }
.view-tab {
  padding: 12px 20px; font-size: 14px; color: #666; cursor: pointer;
  border-bottom: 2px solid transparent; transition: all .2s; background: none; border-top: none; border-left: none; border-right: none;
}
.view-tab:hover { color: #409EFF; }
.view-tab.active { color: #409EFF; border-bottom-color: #409EFF; font-weight: 500; }

.view-container { padding-top: 48px; height: 100vh; }
.view-panel { display: none; height: 100%; }
.view-panel.active { display: flex; }

/* ====== IM 用户端样式 ====== */
#imView { justify-content: center; align-items: center; background: #f5f5f5; }

.chat-window {
  width: 420px; height: 680px; background: #EFF6FC; border-radius: 12px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.12); display: flex; flex-direction: column; overflow: hidden;
}
.chat-header {
  background: #2CABFB; color: white; padding: 14px 20px; display: flex; align-items: center; gap: 12px; flex-shrink: 0;
}
.chat-header .avatar {
  width: 34px; height: 34px; border-radius: 50%; background: rgba(255,255,255,0.25);
  display: flex; align-items: center; justify-content: center; font-size: 17px;
}
.chat-header .info { flex: 1; }
.chat-header .name { font-size: 15px; font-weight: 500; }
.chat-header .status { font-size: 12px; opacity: 0.8; margin-top: 1px; }

.chat-body {
  flex: 1; overflow-y: auto; padding: 14px 12px; display: flex; flex-direction: column; gap: 10px; scroll-behavior: smooth;
}
.chat-body::-webkit-scrollbar { width: 4px; }
.chat-body::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.12); border-radius: 2px; }

.time-label { text-align: center; margin: 4px 0; }
.time-label span { background: #D3E7FB; color: white; font-size: 12px; padding: 2px 8px; border-radius: 3px; }

.msg-row { display: flex; max-width: 100%; }
.msg-row.me { justify-content: flex-end; }
.msg-row.other { justify-content: flex-start; }

.msg-bubble {
  max-width: 80%; padding: 10px; border-radius: 8px; font-size: 14px;
  position: relative; word-break: break-word; line-height: 1.5;
}
.msg-row.me .msg-bubble {
  background: #2CABFB; color: white; margin-right: 20px;
}
.msg-row.me .msg-bubble::after {
  content: ''; position: absolute; right: -12px; top: 10px;
  border-top: 6px solid transparent; border-right: 6px solid transparent;
  border-left: 6px solid #2CABFB; border-bottom: 6px solid transparent;
}
.msg-row.other .msg-bubble {
  background: white; color: #333; margin-left: 20px;
}
.msg-row.other .msg-bubble::after {
  content: ''; position: absolute; left: -12px; top: 10px;
  border-top: 6px solid transparent; border-right: 6px solid white;
  border-left: 6px solid transparent; border-bottom: 6px solid transparent;
}

/* 验证卡片 - IM端 */
.verify-card {
  max-width: 85%; margin-left: 20px; background: white; border-radius: 12px;
  overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.06);
}
.verify-card-header {
  background: linear-gradient(135deg, #2CABFB 0%, #1E90D6 100%); color: white;
  padding: 12px 14px; display: flex; align-items: center; gap: 10px;
}
.verify-card-header .icon {
  width: 30px; height: 30px; background: rgba(255,255,255,0.2); border-radius: 8px;
  display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0;
}
.verify-card-header .title { font-size: 13px; font-weight: 500; }
.verify-card-header .desc { font-size: 11px; opacity: 0.85; margin-top: 2px; }

.verify-card-body { padding: 14px; }
.verify-card-body .phone-info {
  display: flex; align-items: center; gap: 8px; padding: 8px 10px;
  background: #F5FBFF; border-radius: 8px; margin-bottom: 12px; font-size: 12px; color: #666;
}
.verify-card-body .phone-info .phone-num { color: #333; font-weight: 500; }

.code-input-area { display: flex; gap: 6px; margin-bottom: 10px; }
.code-boxes { display: flex; gap: 5px; flex: 1; }
.code-box {
  width: 36px; height: 40px; border: 1.5px solid #E0E0E0; border-radius: 6px;
  text-align: center; font-size: 18px; font-weight: 600; color: #333;
  outline: none; transition: border-color .2s; caret-color: #2CABFB;
}
.code-box:focus { border-color: #2CABFB; box-shadow: 0 0 0 2px rgba(44,171,251,0.15); }
.code-box.filled { border-color: #2CABFB; background: #F5FBFF; }
.code-box.error { border-color: #F56C6C; background: #FEF0F0; }
.code-box.success { border-color: #67C23A; background: #F0F9EB; }

.resend-btn {
  white-space: nowrap; padding: 0 12px; height: 40px; border-radius: 6px;
  border: 1px solid #2CABFB; background: white; color: #2CABFB; font-size: 12px;
  cursor: pointer; transition: all .2s; display: flex; align-items: center;
}
.resend-btn:hover:not(:disabled) { background: #F5FBFF; }
.resend-btn:disabled { border-color: #ccc; color: #999; cursor: not-allowed; }

.verify-submit-btn {
  width: 100%; height: 36px; border-radius: 6px; border: none;
  background: #2CABFB; color: white; font-size: 13px; font-weight: 500;
  cursor: pointer; transition: all .2s; display: flex; align-items: center; justify-content: center;
}
.verify-submit-btn:hover:not(:disabled) { background: #1E9AE8; }
.verify-submit-btn:disabled { background: #B8DFFA; cursor: not-allowed; }

.verify-tip { font-size: 11px; color: #999; margin-top: 8px; text-align: center; }
.verify-tip.error { color: #F56C6C; }
.verify-tip.success { color: #67C23A; }

.verify-success-card {
  max-width: 85%; margin-left: 20px; background: white; border-radius: 12px;
  overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.06); padding: 16px; text-align: center;
}
.success-icon { font-size: 40px; margin-bottom: 8px; }
.success-title { font-size: 14px; font-weight: 500; color: #333; margin-bottom: 3px; }
.success-desc { font-size: 12px; color: #999; }

.verify-expired-card {
  max-width: 85%; margin-left: 20px; background: white; border-radius: 12px;
  overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.06); opacity: 0.7; position: relative;
}
.expired-overlay {
  position: absolute; inset: 0; background: rgba(255,255,255,0.6);
  display: flex; align-items: center; justify-content: center; font-size: 13px; color: #999; font-weight: 500;
}

.progress-bar { height: 3px; background: #E8F0F8; border-radius: 2px; margin-top: 8px; overflow: hidden; }
.progress-fill { height: 100%; background: #2CABFB; border-radius: 2px; transition: width 0.3s ease; }

.chat-footer { padding: 10px 14px; background: white; border-top: 1px solid #E8F0F8; flex-shrink: 0; }
.input-area { display: flex; gap: 8px; align-items: flex-end; }
.input-area textarea {
  flex: 1; border: 1px solid #DCDFE6; border-radius: 8px; padding: 8px 10px;
  font-size: 13px; resize: none; outline: none; font-family: inherit; min-height: 34px; max-height: 60px;
}
.input-area textarea:focus { border-color: #2CABFB; }
.send-btn {
  padding: 7px 16px; background: #2CABFB; color: white; border: none;
  border-radius: 8px; font-size: 13px; cursor: pointer; white-space: nowrap; height: 34px;
}

.typing-indicator {
  display: flex; gap: 4px; padding: 10px; margin-left: 20px; background: white;
  border-radius: 8px; width: fit-content; position: relative;
}
.typing-indicator::after {
  content: ''; position: absolute; left: -12px; top: 10px;
  border-top: 6px solid transparent; border-right: 6px solid white;
  border-left: 6px solid transparent; border-bottom: 6px solid transparent;
}
.typing-dot {
  width: 6px; height: 6px; background: #B0B0B0; border-radius: 50%;
  animation: typingBounce 1.2s ease-in-out infinite;
}
.typing-dot:nth-child(2) { animation-delay: 0.2s; }
.typing-dot:nth-child(3) { animation-delay: 0.4s; }
@keyframes typingBounce {
  0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
  30% { transform: translateY(-5px); opacity: 1; }
}

/* ====== 客服后台样式 ====== */
#consoleView { background: #F6F7FA; }

.console-drawer {
  width: 100%; height: 100%; background: white; display: flex; flex-direction: column; overflow: hidden;
}
.drawer-header {
  padding: 14px 24px; border-bottom: 1px solid #e4e7ed; display: flex; align-items: center;
  font-size: 16px; font-weight: 500; color: #303133; flex-shrink: 0;
}
.drawer-header span { margin-left: 8px; font-size: 12px; color: #909399; font-weight: 400; }

.drawer-body { flex: 1; display: flex; overflow: hidden; }

/* 左侧会话列表 */
.session-list {
  width: 20%; min-width: 200px; border-right: 1px solid #e4e7ed; overflow-y: auto; padding: 12px;
}
.session-card {
  padding: 12px; border: 1px solid #eee; border-radius: 8px; margin-bottom: 8px;
  cursor: pointer; transition: all .2s; font-size: 12px;
}
.session-card:hover { border-color: #c0d8f0; background: #f8fbff; }
.session-card.active { border-color: #409EFF; background: #ecf5ff; }
.session-card .sc-time { color: #999; margin-bottom: 6px; }
.session-card .sc-stats { display: flex; gap: 12px; color: #666; }
.session-card .sc-stat-item { display: flex; align-items: center; gap: 3px; }
.session-card .sc-dot { width: 6px; height: 6px; border-radius: 50%; }
.session-card .sc-dot.blue { background: #409EFF; }
.session-card .sc-dot.orange { background: #E6A23C; }

/* 中间消息区 */
.session-content {
  width: 50%; display: flex; flex-direction: column; overflow: hidden;
}
.session-content-header {
  padding: 10px 16px; border-bottom: 1px solid #eee; font-size: 13px; color: #666;
  display: flex; align-items: center; gap: 8px; flex-shrink: 0;
}
.session-msgs {
  flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 8px;
}
.session-msgs::-webkit-scrollbar { width: 4px; }
.session-msgs::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.1); border-radius: 2px; }

/* 后台消息气泡 */
.c-msg-row { display: flex; max-width: 100%; margin: 4px 0; }
.c-msg-row.me { justify-content: flex-end; }
.c-msg-row.other { justify-content: flex-start; }

.c-msg-wrap {
  max-width: 80%; display: flex; flex-direction: column;
}
.c-msg-row.me .c-msg-wrap { align-items: flex-end; margin-right: 10px; }
.c-msg-row.other .c-msg-wrap { align-items: flex-start; margin-left: 10px; }

.c-msg-meta { font-size: 12px; color: #999; margin-bottom: 4px; display: flex; align-items: center; gap: 6px; }
.c-msg-meta .robot-icon { display: inline-block; width: 14px; height: 14px; background: #409EFF; border-radius: 3px; color: white; font-size: 9px; text-align: center; line-height: 14px; }

.c-msg-bubble {
  padding: 10px; font-size: 13px; word-break: break-word; line-height: 1.5; white-space: pre-line;
}
.c-msg-row.me .c-msg-bubble {
  background: #409EFF; color: white; border: 1px solid #409EFF; border-radius: 10px 0 10px 10px;
}
.c-msg-row.other .c-msg-bubble {
  background: white; color: #666; border: 1px solid #409EFF; border-radius: 0 10px 10px 10px; width: 100%;
}

/* 后台验证卡片（只读） */
.c-verify-card {
  background: white; border: 1px solid #409EFF; border-radius: 0 10px 10px 10px;
  overflow: hidden; width: 100%;
}
.c-verify-card-header {
  background: linear-gradient(135deg, #409EFF 0%, #337ecc 100%); color: white;
  padding: 10px 14px; display: flex; align-items: center; gap: 8px;
}
.c-verify-card-header .c-icon {
  width: 28px; height: 28px; background: rgba(255,255,255,0.2); border-radius: 6px;
  display: flex; align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0;
}
.c-verify-card-header .c-title { font-size: 13px; font-weight: 500; }
.c-verify-card-header .c-desc { font-size: 11px; opacity: 0.85; margin-top: 1px; }

.c-verify-card-body { padding: 12px 14px; }
.c-verify-card-body .c-phone-row {
  display: flex; align-items: center; gap: 6px; font-size: 12px; color: #666;
  padding: 6px 10px; background: #f4f7fa; border-radius: 6px; margin-bottom: 10px;
}
.c-verify-card-body .c-phone-row strong { color: #333; }

.c-verify-status {
  display: flex; align-items: center; gap: 6px; padding: 8px 12px;
  border-radius: 6px; font-size: 12px; font-weight: 500;
}
.c-verify-status.success { background: #f0f9eb; color: #67C23A; border: 1px solid #e1f3d8; }
.c-verify-status.fail { background: #fef0f0; color: #F56C6C; border: 1px solid #fde2e2; }
.c-verify-status.expired { background: #fdf6ec; color: #E6A23C; border: 1px solid #faecd8; }
.c-verify-status.pending { background: #ecf5ff; color: #409EFF; border: 1px solid #d9ecff; }

.c-verify-detail { margin-top: 8px; font-size: 11px; color: #999; }
.c-verify-detail .c-row { display: flex; justify-content: space-between; padding: 3px 0; }

.c-timeout-msg { text-align: center; font-size: 12px; color: #909399; padding: 6px 0; }

/* 右侧客户信息 */
.customer-detail {
  width: 30%; min-width: 240px; border-left: 1px solid #e4e7ed; padding: 16px 20px; overflow-y: auto;
}
.cd-section-title { font-size: 14px; font-weight: 500; color: #303133; margin-bottom: 12px; }
.cd-card {
  border: 1px solid #e4e7ed; border-radius: 8px; padding: 14px; margin-bottom: 16px;
}
.cd-card-title { font-size: 13px; font-weight: 500; color: #303133; margin-bottom: 10px; padding-bottom: 8px; border-bottom: 1px solid #eee; }
.cd-item { display: flex; font-size: 12px; padding: 5px 0; }
.cd-item .cd-label { color: #909399; width: 70px; flex-shrink: 0; }
.cd-item .cd-value { color: #303133; flex: 1; }

/* 场景面板 */
.scenario-panel {
  position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 100;
  background: white; border-radius: 12px; box-shadow: 0 4px 24px rgba(0,0,0,0.14);
  padding: 14px 18px; display: flex; align-items: center; gap: 10px;
}
.scenario-panel .sp-label { font-size: 13px; color: #333; font-weight: 500; white-space: nowrap; }
.sp-btn {
  padding: 6px 14px; border-radius: 6px; border: 1px solid #ddd; background: white;
  font-size: 12px; color: #666; cursor: pointer; transition: all .15s; white-space: nowrap;
}
.sp-btn:hover { border-color: #409EFF; color: #409EFF; }
.sp-btn.active { border-color: #409EFF; background: #ecf5ff; color: #409EFF; }
.sp-divider { width: 1px; height: 20px; background: #e4e7ed; }

/* 动画 */
@keyframes fadeInUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
.fade-in { animation: fadeInUp 0.3s ease-out; }
@keyframes shake { 0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-4px)}40%,80%{transform:translateX(4px)} }
.shake { animation: shake 0.4s ease-out; }
</style>
</head>
<body>

<!-- 顶部 Tab 切换 -->
<div class="view-tabs">
  <span class="tab-title">IM短信验证码身份核验</span>
  <button class="view-tab active" onclick="switchView('im')" id="tabIm">IM 用户端</button>
  <button class="view-tab" onclick="switchView('console')" id="tabConsole">客服后台 · 会话明细</button>
</div>

<div class="view-container">
  <!-- ====== IM 用户端 ====== -->
  <div class="view-panel active" id="imView">
    <div class="chat-window">
      <div class="chat-header">
        <div class="avatar">🤖</div>
        <div class="info"><div class="name">智能客服助手</div><div class="status">在线服务中</div></div>
      </div>
      <div class="chat-body" id="chatBody"></div>
      <div class="chat-footer">
        <div class="input-area">
          <textarea id="userInput" placeholder="输入消息..." rows="1" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();handleUserSend()}"></textarea>
          <button class="send-btn" onclick="handleUserSend()">发送</button>
        </div>
      </div>
    </div>
  </div>

  <!-- ====== 客服后台 · 会话明细 ====== -->
  <div class="view-panel" id="consoleView">
    <div class="console-drawer">
      <div class="drawer-header">会话详情 <span>客服后台管理系统</span></div>
      <div class="drawer-body">
        <div class="session-list" id="sessionList"></div>
        <div class="session-content">
          <div class="session-content-header">
            <span>🤖</span> <span id="consoleContentTitle">消息记录</span>
          </div>
          <div class="session-msgs" id="consoleMsgs"></div>
        </div>
        <div class="customer-detail" id="customerDetail"></div>
      </div>
    </div>
  </div>
</div>

<!-- 场景切换 -->
<div class="scenario-panel" id="scenarioPanel">
  <span class="sp-label">场景：</span>
  <button class="sp-btn active" onclick="runScenario('normal')" id="btnNormal">验证成功</button>
  <button class="sp-btn" onclick="runScenario('wrong')" id="btnWrong">验证失败</button>
  <button class="sp-btn" onclick="runScenario('expired')" id="btnExpired">验证过期</button>
  <div class="sp-divider"></div>
  <button class="sp-btn" onclick="resetAll()" style="color:#F56C6C;border-color:#F56C6C;">重置</button>
</div>

<script>
/* ====== 状态 ====== */
const chatBody = document.getElementById('chatBody');
const consoleMsgs = document.getElementById('consoleMsgs');
let countdown = 0, countdownTimer = null, currentScenario = 'normal', currentView = 'im';

/* ====== 视图切换 ====== */
function switchView(view) {
  currentView = view;
  document.querySelectorAll('.view-tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.view-panel').forEach(p => p.classList.remove('active'));
  document.getElementById(view === 'im' ? 'tabIm' : 'tabConsole').classList.add('active');
  document.getElementById(view === 'im' ? 'imView' : 'consoleView').classList.add('active');
}

/* ====== IM 用户端方法 ====== */
function scrollToBottom() { setTimeout(() => { chatBody.scrollTop = chatBody.scrollHeight; }, 50); }

function addTimeLabel(text) {
  const d = document.createElement('div');
  d.className = 'time-label fade-in';
  d.innerHTML = `<span>${text}</span>`;
  chatBody.appendChild(d);
}

function addMessage(side, text) {
  const r = document.createElement('div');
  r.className = `msg-row ${side} fade-in`;
  r.innerHTML = `<div class="msg-bubble">${text}</div>`;
  chatBody.appendChild(r);
  scrollToBottom();
}

function addTyping() {
  const d = document.createElement('div');
  d.className = 'msg-row other fade-in'; d.id = 'typingIndicator';
  d.innerHTML = `<div class="typing-indicator"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div>`;
  chatBody.appendChild(d); scrollToBottom();
}
function removeTyping() { document.getElementById('typingIndicator')?.remove(); }

function addVerifyCard(phone, isExpired) {
  const r = document.createElement('div');
  r.className = 'msg-row other fade-in'; r.id = 'verifyCardRow';
  if (isExpired) {
    r.innerHTML = `<div class="verify-expired-card"><div class="verify-card">
      <div class="verify-card-header"><div class="icon">🔐</div><div><div class="title">短信验证码身份核验</div><div class="desc">请输入您收到的 6 位验证码</div></div></div>
      <div class="verify-card-body"><div class="phone-info"><span>📱</span><span>验证码已发送至 <span class="phone-num">${phone}</span></span></div>
      <div class="code-input-area"><div class="code-boxes">${Array(6).fill('<input class="code-box" maxlength="1" disabled>').join('')}</div></div></div>
    </div><div class="expired-overlay">⏰ 验证码已过期</div></div>`;
  } else {
    r.innerHTML = `<div class="verify-card" id="verifyCard">
      <div class="verify-card-header"><div class="icon">🔐</div><div><div class="title">短信验证码身份核验</div><div class="desc">请输入您收到的 6 位验证码</div></div></div>
      <div class="verify-card-body"><div class="phone-info"><span>📱</span><span>验证码已发送至 <span class="phone-num">${phone}</span></span></div>
      <div class="code-input-area"><div class="code-boxes" id="codeBoxes">
        ${Array(6).fill(0).map((_,i)=>`<input class="code-box" id="code${i}" maxlength="1" oninput="onCodeInput(this,${i})" onkeydown="onCodeKeydown(event,${i})" onfocus="this.select()">`).join('')}
      </div><button class="resend-btn" id="resendBtn" onclick="handleResend()">获取验证码</button></div>
      <button class="verify-submit-btn" id="submitBtn" onclick="handleVerifySubmit()" disabled><span>验 证</span></button>
      <div class="verify-tip" id="verifyTip">验证码 5 分钟内有效，请勿泄露给他人</div>
      <div class="progress-bar" id="progressBar" style="display:none"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
      </div></div>`;
  }
  chatBody.appendChild(r); scrollToBottom();
  if (!isExpired) { setTimeout(()=>document.getElementById('code0')?.focus(),100); startResendCountdown(); }
}

function onCodeInput(el,i){ el.value=el.value.replace(/\D/g,''); if(el.value&&i<5) document.getElementById(`code${i+1}`).focus(); updateCodeState(); checkAllFilled(); }
function onCodeKeydown(e,i){ if(e.key==='Backspace'&&!e.target.value&&i>0) document.getElementById(`code${i-1}`).focus(); }
function updateCodeState(){ for(let i=0;i<6;i++){const b=document.getElementById(`code${i}`);if(!b)return;b.classList.toggle('filled',!!b.value);b.classList.remove('error','success');} }
function checkAllFilled(){ const btn=document.getElementById('submitBtn');if(btn)btn.disabled=getCode().length<6; }
function getCode(){ let c='';for(let i=0;i<6;i++){const b=document.getElementById(`code${i}`);if(b)c+=b.value;}return c; }

function startResendCountdown(){
  countdown=60;const btn=document.getElementById('resendBtn');if(!btn)return;
  btn.disabled=true;btn.textContent=`${countdown}s`;
  countdownTimer=setInterval(()=>{countdown--;if(countdown<=0){clearInterval(countdownTimer);btn.disabled=false;btn.textContent='重新发送';}else btn.textContent=`${countdown}s`;},1000);
}
function handleResend(){
  addMessage('other','验证码已重新发送，请注意查收短信 📩'); startResendCountdown();
  for(let i=0;i<6;i++){const b=document.getElementById(`code${i}`);if(b){b.value='';b.classList.remove('filled','error','success');}}
  const t=document.getElementById('verifyTip');if(t){t.textContent='新验证码已发送，5 分钟内有效';t.className='verify-tip';}
  document.getElementById('code0')?.focus();
}

function handleVerifySubmit(){
  if(getCode().length<6)return;
  const btn=document.getElementById('submitBtn');btn.disabled=true;btn.innerHTML='<span>验证中...</span>';
  const pg=document.getElementById('progressBar'),fl=document.getElementById('progressFill');pg.style.display='block';
  let pct=0;const pt=setInterval(()=>{pct+=15;fl.style.width=Math.min(pct,90)+'%';if(pct>=90)clearInterval(pt);},100);
  setTimeout(()=>{clearInterval(pt);fl.style.width='100%';setTimeout(()=>{currentScenario==='wrong'?showVerifyError():showVerifySuccess();},300);},1200);
}

function showVerifySuccess(){
  for(let i=0;i<6;i++){const b=document.getElementById(`code${i}`);if(b){b.classList.add('success');b.disabled=true;}}
  const t=document.getElementById('verifyTip');t.textContent='✅ 身份核验通过';t.className='verify-tip success';
  const btn=document.getElementById('submitBtn');btn.innerHTML='<span>✅ 验证成功</span>';btn.style.background='#67C23A';
  const rs=document.getElementById('resendBtn');if(rs)rs.style.display='none';
  if(countdownTimer)clearInterval(countdownTimer);
  setTimeout(()=>{
    const r=document.createElement('div');r.className='msg-row other fade-in';
    r.innerHTML=`<div class="verify-success-card"><div class="success-icon">🎉</div><div class="success-title">身份核验通过</div><div class="success-desc">已确认您的身份，可以继续为您服务</div></div>`;
    chatBody.appendChild(r);scrollToBottom();
    setTimeout(()=>{addMessage('other','身份核验已通过，正在为您查询相关信息，请稍候...');
      setTimeout(()=>{addMessage('other','已查询到您的订单信息：\n\n📦 订单编号：SN20260427001\n📅 下单时间：2026-04-25\n📍 物流状态：配送中\n🚚 预计送达：2026-04-28');},1200);
    },600);
  },500);
}

function showVerifyError(){
  const bx=document.getElementById('codeBoxes');bx.classList.add('shake');setTimeout(()=>bx.classList.remove('shake'),500);
  for(let i=0;i<6;i++){const b=document.getElementById(`code${i}`);if(b){b.classList.add('error');b.value='';}}
  const t=document.getElementById('verifyTip');t.textContent='❌ 验证码错误，请重新输入';t.className='verify-tip error';
  const btn=document.getElementById('submitBtn');btn.disabled=true;btn.innerHTML='<span>验 证</span>';btn.style.background='';
  document.getElementById('progressBar').style.display='none';
  setTimeout(()=>{for(let i=0;i<6;i++){const b=document.getElementById(`code${i}`);if(b)b.classList.remove('error');}document.getElementById('code0')?.focus();},1500);
}

function handleUserSend(){ const inp=document.getElementById('userInput');const t=inp.value.trim();if(!t)return;inp.value='';addMessage('me',t); }

function addConsoleMsg(side, time, text, opts) {
  const r = document.createElement('div');
  r.className = `c-msg-row ${side} fade-in`;
  const isBot = side === 'other';
  const metaHtml = `<div class="c-msg-meta">${time}${isBot ? ' <span class="robot-icon">AI</span>' : ''}${opts?.state ? ` <span style="font-size:11px;color:#c0c4cc">${opts.state}</span>` : ''}</div>`;
  r.innerHTML = `<div class="c-msg-wrap">${metaHtml}<div class="c-msg-bubble">${text}</div></div>`;
  consoleMsgs.appendChild(r);
  consoleMsgs.scrollTop = consoleMsgs.scrollHeight;
}

function addConsoleVerifyCard(phone, status) {
  const r = document.createElement('div');
  r.className = 'c-msg-row other fade-in';

  let statusClass = '', statusIcon = '', statusText = '', detailHtml = '';
  if (status === 'success') {
    statusClass = 'success'; statusIcon = '✅'; statusText = '核验通过';
    detailHtml = `<div class="c-verify-detail"><div class="c-row"><span>验证码提交</span><span>14:33:12</span></div><div class="c-row"><span>校验结果</span><span style="color:#67C23A">通过</span></div></div>`;
  } else if (status === 'fail') {
    statusClass = 'fail'; statusIcon = '❌'; statusText = '校验失败（错误 2 次）';
    detailHtml = `<div class="c-verify-detail"><div class="c-row"><span>第1次提交</span><span style="color:#F56C6C">错误</span></div><div class="c-row"><span>第2次提交</span><span style="color:#F56C6C">错误</span></div></div>`;
  } else if (status === 'expired') {
    statusClass = 'expired'; statusIcon = '⏰'; statusText = '验证码已过期';
    detailHtml = `<div class="c-verify-detail"><div class="c-row"><span>发送时间</span><span>14:32:45</span></div><div class="c-row"><span>过期时间</span><span>14:37:45</span></div></div>`;
  } else {
    statusClass = 'pending'; statusIcon = '⏳'; statusText = '等待用户验证';
    detailHtml = '';
  }

  r.innerHTML = `<div class="c-msg-wrap" style="margin-left:10px;max-width:80%;">
    <div class="c-msg-meta">14:32:45 <span class="robot-icon">AI</span></div>

/* ====== 场景运行 ====== */
function resetAll() {
  chatBody.innerHTML = ''; consoleMsgs.innerHTML = '';
  if (countdownTimer) clearInterval(countdownTimer);
  document.querySelectorAll('.sp-btn').forEach(b => b.classList.remove('active'));
}

async function delay(ms) { return new Promise(r => setTimeout(r, ms)); }

async function runScenario(type) {
  resetAll();
  currentScenario = type;
  document.querySelectorAll('.sp-btn').forEach(b => b.classList.remove('active'));
  ({normal:'btnNormal',wrong:'btnWrong',expired:'btnExpired'})[type] && document.getElementById(({normal:'btnNormal',wrong:'btnWrong',expired:'btnExpired'})[type]).classList.add('active');

  const phone = '138****6789';

  buildSessionList();
  buildCustomerDetail();

  // ── IM 端 ──
  addTimeLabel('今天 14:32');
  await delay(200);
  addMessage('me', '你好，我想查一下我的订单物流信息');
  await delay(500);
  addTyping(); await delay(700); removeTyping();
  addMessage('other', '您好！为了保护您的账户安全，查询订单信息需要先进行身份核验。我将向您的手机号发送一条短信验证码，请您配合完成验证 🔒');
  await delay(600);
  addTyping(); await delay(500); removeTyping();
  addMessage('other', `检测到您绑定的手机号为 <b>${phone}</b>，验证码已发送，请查收短信 📲`);
  await delay(400);

  // ── 客服后台 ──
  addConsoleMsg('me', '14:32:10', '你好，我想查一下我的订单物流信息');
  addConsoleMsg('other', '14:32:12', '您好！为了保护您的账户安全，查询订单信息需要先进行身份核验。我将向您的手机号发送一条短信验证码，请您配合完成验证', {state:'已应答'});
  addConsoleMsg('other', '14:32:15', `检测到您绑定的手机号为 ${phone}，验证码已发送，请查收短信`, {state:'已应答'});

  if (type === 'expired') {
    addVerifyCard(phone, true);
    addConsoleVerifyCard(phone, 'expired');
    await delay(500);
    addMessage('other', '抱歉，验证码已过期，请点击下方按钮重新获取验证码。');
    addConsoleMsg('other', '14:37:50', '抱歉，验证码已过期，请点击下方按钮重新获取验证码。', {state:'已应答'});
    const rb = document.createElement('div'); rb.className = 'msg-row other fade-in';
    rb.innerHTML = `<div style="margin-left:20px;"><button onclick="runScenario('normal')" style="padding:7px 16px;border-radius:6px;border:1px solid #2CABFB;background:#F5FBFF;color:#2CABFB;font-size:12px;cursor:pointer;">🔄 重新发送验证码</button></div>`;
    chatBody.appendChild(rb); scrollToBottom();

    document.getElementById('cdResult').innerHTML = '<span style="color:#E6A23C">验证码过期</span>';
    document.getElementById('cdResultTime').textContent = '14:37:45';

  } else if (type === 'wrong') {
    addVerifyCard(phone, false);
    addConsoleVerifyCard(phone, 'fail');

    await delay(1000);
    for (let i=0;i<6;i++){const b=document.getElementById(`code${i}`);if(b){b.value='123456'[i];b.classList.add('filled');await delay(80);}}
    checkAllFilled();

    addConsoleMsg('other', '14:33:05', '验证码校验失败，已通知用户重新输入', {state:'已应答'});

    document.getElementById('cdResult').innerHTML = '<span style="color:#F56C6C">校验失败（2次）</span>';
    document.getElementById('cdResultTime').textContent = '14:33:30';

  } else {
    addVerifyCard(phone, false);
    addConsoleVerifyCard(phone, 'success');
    addConsoleSuccessCard();

    await delay(1000);
    for (let i=0;i<6;i++){const b=document.getElementById(`code${i}`);if(b){b.value='385926'[i];b.classList.add('filled');await delay(80);}}
    checkAllFilled();

    addConsoleMsg('other', '14:33:13', '身份核验通过，开始处理用户查询请求', {state:'已应答'});
    addConsoleMsg('other', '14:33:16', '已查询到您的订单信息：\n订单编号：SN20260427001\n下单时间：2026-04-25\n物流状态：配送中\n预计送达：2026-04-28', {state:'已应答'});

    document.getElementById('cdResult').innerHTML = '<span style="color:#67C23A">核验通过</span>';
    document.getElementById('cdResultTime').textContent = '14:33:12';
  }
}

runScenario('normal');
</script>
