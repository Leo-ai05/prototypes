<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI员工明细-任务执行明细优化 - 可交互原型 v1.0</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;background:#f5f7fa;color:#303133;font-size:14px}
.app{display:flex;min-height:100vh}
.sidebar{width:220px;background:#1d1e1f;color:#fff;flex-shrink:0}
.sidebar-logo{padding:20px 16px;font-size:16px;font-weight:600;border-bottom:1px solid #333}
.sidebar-menu{padding:8px 0}
.sidebar-item{padding:12px 20px;cursor:pointer;font-size:14px;color:#bbb;transition:all .2s}
.sidebar-item:hover,.sidebar-item.active{background:#409eff;color:#fff}
.sidebar-sub{padding-left:40px}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.header{height:50px;background:#fff;border-bottom:1px solid #e4e7ed;display:flex;align-items:center;padding:0 20px}
.header-title{font-size:16px;font-weight:500}

.tag{display:inline-block;padding:2px 10px;border-radius:4px;font-size:12px;white-space:nowrap}
.tag-success{background:#f0f9eb;color:#67c23a;border:1px solid #e1f3d8}
.tag-warning{background:#fdf6ec;color:#e6a23c;border:1px solid #f5dab1}
.tag-info{background:#f4f4f5;color:#909399;border:1px solid #d3d4d6}
.tag-primary{background:#ecf5ff;color:#409eff;border:1px solid #b3d8ff}
.tag-danger{background:#fef0f0;color:#f56c6c;border:1px solid #fde2e2}
.tag-fallback{background:#fff7e6;color:#d48806;border:1px solid #ffe58f;font-weight:500}

.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:4px;border:1px solid #dcdfe6;cursor:pointer;font-size:14px;transition:all .2s;background:#fff}
.btn-primary{background:#409eff;color:#fff;border-color:#409eff}
.btn-sm{padding:5px 12px;font-size:12px}

.ai-layout{display:flex;height:calc(100vh - 50px);background:#f5f5f5}
.ai-panel{display:flex;flex-direction:column;background:#fff;border-right:1px solid #e5e5e5}
.ai-panel-left{width:240px;flex-shrink:0}
.ai-panel-mid{width:280px;flex-shrink:0}
.ai-panel-right{flex:1;min-width:0;display:flex;flex-direction:column;background:#fff}
.ai-panel-title{padding:14px 16px;border-bottom:1px solid #e5e5e5;font-weight:600;font-size:15px}
.ai-list{flex:1;overflow-y:auto}
.ai-list-item{display:flex;align-items:center;padding:10px 16px;cursor:pointer;transition:background .2s;border-bottom:1px solid #f5f5f5}
.ai-list-item:hover{background:#f5f5f5}
.ai-list-item.active{background:#e6f7ff}
.ai-avatar{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;color:#fff;flex-shrink:0;font-weight:500}
.ai-item-info{margin-left:10px;flex:1;min-width:0}
.ai-item-name{font-weight:500;font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ai-item-meta{font-size:11px;color:#999;margin-top:2px}

.ai-tabs{display:flex;border-bottom:1px solid #e5e5e5;flex-shrink:0}
.ai-tab{padding:0 16px;height:40px;display:flex;align-items:center;cursor:pointer;font-size:13px;color:#666;position:relative}
.ai-tab.active{color:#409eff;font-weight:500}
.ai-tab.active::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:#409eff}
.ai-tab-content{flex:1;overflow-y:auto;padding:16px}

.overview-card{border:1px solid #b3d8ff;border-radius:8px;padding:16px;background:#f0f9ff;margin-bottom:16px}
.overview-row{display:flex;align-items:center;gap:16px;margin-bottom:8px;flex-wrap:wrap}
.overview-row:last-child{margin-bottom:0}
.overview-label{font-size:12px;color:#909399;min-width:60px}
.overview-value{font-size:13px;font-weight:500}

.member-badge{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;background:#fff;border:1px solid #e4e7ed;border-radius:16px;font-size:12px}
.member-badge .dot{width:6px;height:6px;border-radius:50%}
.member-badge .dot.online{background:#67c23a}
.member-badge .dot.offline{background:#c0c4cc}
.mirror-link{color:#409eff;font-size:12px;cursor:pointer;text-decoration:underline}

.filter-bar{display:flex;align-items:center;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.filter-btn{padding:4px 12px;border-radius:16px;border:1px solid #dcdfe6;font-size:12px;cursor:pointer;background:#fff;transition:all .2s}
.filter-btn.active{background:#409eff;color:#fff;border-color:#409eff}
.filter-btn:hover{border-color:#409eff}
.stats-text{font-size:12px;color:#909399;margin-left:auto}

.rule-card{border:1px solid #ebeef5;border-radius:8px;margin-bottom:8px;overflow:hidden;transition:all .2s}
.rule-card:hover{box-shadow:0 2px 8px rgba(0,0,0,.06)}
.rule-card-header{padding:12px 16px;display:flex;align-items:center;justify-content:space-between;cursor:pointer}
.rule-card-header:hover{background:#fafbfc}
.rule-left{display:flex;align-items:center;gap:10px;flex:1;min-width:0}
.rule-info{flex:1;min-width:0}
.rule-name{font-size:13px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.rule-desc{font-size:11px;color:#909399;margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.rule-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
.rule-time{font-size:11px;color:#909399}
.reason-tag{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:500}
.reason-orange{background:#fdf6ec;color:#e6a23c;border:1px solid #f5dab1}
.reason-red{background:#fef0f0;color:#f56c6c;border:1px solid #fde2e2}
.reason-gray{background:#f4f4f5;color:#909399;border:1px solid #d3d4d6}
.reason-blue{background:#ecf5ff;color:#409eff;border:1px solid #b3d8ff}
.expand-arrow{transition:transform .3s;color:#c0c4cc;font-size:12px}
.expand-arrow.expanded{transform:rotate(180deg)}

.rule-detail{padding:12px 16px;border-top:1px solid #f0f0f0;background:#fafbfc;animation:slideDown .3s}
@keyframes slideDown{from{opacity:0}to{opacity:1}}
.cond-item{display:flex;align-items:flex-start;gap:8px;padding:8px 10px;border-radius:6px;border:1px solid;margin-bottom:6px;font-size:12px}
.cond-item.ok{background:#f0f9eb;border-color:#e1f3d8}
.cond-item.fail{background:#fef0f0;border-color:#fde2e2}
.cond-icon{font-size:14px;flex-shrink:0;line-height:1.4}
.cond-body{flex:1}
.cond-field{font-weight:500;margin-bottom:2px}
.cond-detail{color:#606266}
.cond-mirror{color:#409eff;font-size:11px}
.suggestion{padding:10px 12px;background:#ecf5ff;border:1px solid #b3d8ff;border-radius:6px;font-size:12px;color:#409eff;margin-top:8px}

.eval-section{margin-top:16px}
.eval-title{font-size:14px;font-weight:500;margin-bottom:10px;padding-left:8px;border-left:3px solid #409eff;cursor:pointer;display:flex;align-items:center;gap:6px}
.eval-card{border:1px solid #ebeef5;border-radius:6px;margin-bottom:6px;overflow:hidden}
.eval-card.matched{border-color:#c2e7b0;background:#f0f9eb}
.eval-card.skipped{border:1px dashed #dcdfe6;background:#fafafa}
.eval-card.fallback{border-color:#ffe58f;background:#fffbe6}
.eval-header{padding:10px 14px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;font-size:13px}
.eval-header:hover{opacity:.85}
.eval-left{display:flex;align-items:center;gap:8px}
.eval-right{display:flex;align-items:center;gap:8px;font-size:12px;color:#909399}

.view-hidden{display:none!important}
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);padding:12px 24px;border-radius:8px;color:#fff;font-size:14px;z-index:9999;animation:fadeIn .3s}
.toast-success{background:#67c23a}
@keyframes fadeIn{from{opacity:0;transform:translateX(-50%) translateY(-10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
</style>
</head>
<body>
<div class="app">
  <div class="sidebar">
    <div class="sidebar-logo">CRM 管理后台</div>
    <div class="sidebar-menu">
      <div class="sidebar-item">工作台</div>
      <div class="sidebar-item">客户管理</div>
      <div class="sidebar-item active">企微机器人</div>
      <div class="sidebar-item sidebar-sub">会话属性</div>
      <div class="sidebar-item sidebar-sub">规则引擎</div>
      <div class="sidebar-item sidebar-sub" style="background:#409eff;color:#fff">AI员工明细</div>
      <div class="sidebar-item sidebar-sub">全局配置</div>
    </div>
  </div>
  <div class="main">
    <div class="header"><span class="header-title">AI员工明细</span></div>
    <div class="ai-layout">
      <div class="ai-panel ai-panel-left">
        <div class="ai-panel-title">AI员工列表</div>
        <div class="ai-list" id="emp-list"></div>
      </div>
      <div class="ai-panel ai-panel-mid">
        <div class="ai-panel-title">会话列表</div>
        <div class="ai-list" id="sess-list"></div>
      </div>
      <div class="ai-panel-right">
        <div id="placeholder" style="flex:1;display:flex;align-items:center;justify-content:center;color:#909399">请选择会话查看任务执行明细</div>
        <div id="detail" class="view-hidden" style="flex:1;display:flex;flex-direction:column">
          <div style="padding:12px 16px;border-bottom:1px solid #e5e5e5;font-weight:500;font-size:15px" id="sess-title">会话</div>
          <div class="ai-tabs">
            <div class="ai-tab" onclick="switchTab('chat')">聊天记录</div>
            <div class="ai-tab" onclick="switchTab('vars')">会话变量</div>
            <div class="ai-tab" onclick="switchTab('mirror')">镜像画像</div>
            <div class="ai-tab active" onclick="switchTab('tasks')" id="tab-tasks">任务执行明细</div>
          </div>
          <div class="ai-tab-content view-hidden" id="c-chat"><div style="text-align:center;padding:40px;color:#909399">💬 聊天记录</div></div>
          <div class="ai-tab-content view-hidden" id="c-vars"><div style="text-align:center;padding:40px;color:#909399">📋 会话变量</div></div>
          <div class="ai-tab-content view-hidden" id="c-mirror"><div style="text-align:center;padding:40px;color:#909399">🔒 镜像画像</div></div>
          <div class="ai-tab-content" id="c-tasks"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
const C=['#409eff','#67c23a','#e6a23c'];
const emps=[{id:'e1',name:'销售A',avatar:'A',color:C[0]},{id:'e2',name:'销售B',avatar:'B',color:C[1]}];
const sessions=[{id:'s1',nick:'张小明',remark:'抖音-张小明',msg:'你好',time:'10:25'},{id:'s2',nick:'李萌萌',remark:'',msg:'优惠活动',time:'09:48'}];

const matchedGroup={name:'通用兜底分组',isFallback:true,reason:'所有普通分组均未命中',matchedAt:'2026-04-22 10:30:05'};
const member={name:'销售A',color:C[0],online:true,bindAt:'2026-04-22 10:30:05'};
const mirrorSource='销售A';

const rules=[
  {id:901,name:'通用欢迎消息',desc:'向所有未命中其他分组的用户发送通用欢迎消息',type:'user_change',status:'executed',executedAt:'2026-04-22 10:32:15',reason:null,conditions:[],action:'发送企微消息：您好，欢迎关注！有什么可以帮您的？',attrChanges:[{field:'跟进阶段',from:'初始',to:'已触达'}]},
  {id:902,name:'基础信息采集',desc:'引导用户补充基础信息',type:'user_change',status:'executed',executedAt:'2026-04-22 10:32:16',reason:null,conditions:[],action:'发送企微消息：为了更好为您服务，请补充以下信息...',attrChanges:[]},
  {id:903,name:'3天后回访提醒',desc:'用户添加3天后发送回访消息',type:'scheduled',status:'pending',scheduledAt:'2026-04-25 10:30:00',reason:null,conditions:[],action:null,attrChanges:[]},
  {id:904,name:'高意向用户专属优惠',desc:'意向等级为高的用户推送专属优惠',type:'user_change',status:'not_triggered',reason:'condition_not_met',reasonText:'条件不满足',conditions:[{field:'意向等级',op:'等于',expect:'高',actual:'低',ok:false}],action:null,attrChanges:[]},
  {id:905,name:'会员开通引导',desc:'未开通会员的用户推送开通引导',type:'user_change',status:'not_triggered',reason:'rule_disabled',reasonText:'规则已禁用',conditions:[{field:'会员状态',op:'等于',expect:'未开通',actual:'未开通',ok:true}],action:null,attrChanges:[]},
  {id:906,name:'购买用户感谢消息',desc:'购买次数大于0的用户发送感谢',type:'user_change',status:'not_triggered',reason:'condition_not_met',reasonText:'条件不满足',conditions:[{field:'购买次数',op:'大于',expect:'0',actual:'0',ok:false}],action:null,attrChanges:[]}
];

const evalGroups=[
  {name:'新用户引导分组',result:'not_matched',reason:'注册天数=15，不满足"< 7"',rules:2,members:2,conditions:[{field:'注册天数',op:'小于',expect:'7',actual:'15',ok:false},{field:'会员状态',op:'等于',expect:'未开通',actual:'未开通',ok:true}]},
  {name:'高价值用户维护分组',result:'not_matched',reason:'购买次数=0，不满足"> 3"',rules:2,members:3,conditions:[{field:'购买次数',op:'大于',expect:'3',actual:'0',ok:false},{field:'最近活跃天数',op:'小于',expect:'30',actual:'2',ok:true}]},
  {name:'抖音渠道用户分组',result:'not_matched',reason:'用户来源=抖音，满足；但分组已禁用',rules:2,members:0,conditions:[{field:'用户来源',op:'等于',expect:'抖音',actual:'抖音',ok:true}]},
  {name:'通用兜底分组',result:'matched',isFallback:true,reason:'所有普通分组均未命中，兜底策略已开启',rules:6,members:1,conditions:[]}
];

let selEmp='e1',selSess=null,filter='all',expandedRules=new Set(),expandedEvals=new Set(),showEval=true;

function renderEmpList(){
  document.getElementById('emp-list').innerHTML=emps.map(e=>`<div class="ai-list-item ${e.id===selEmp?'active':''}" onclick="selEmp='${e.id}';renderEmpList();renderSessList()"><div class="ai-avatar" style="background:${e.color}">${e.avatar}</div><div class="ai-item-info"><div class="ai-item-name">${e.name}</div></div></div>`).join('');
}
function renderSessList(){
  document.getElementById('sess-list').innerHTML=sessions.map(s=>`<div class="ai-list-item ${s.id===selSess?'active':''}" onclick="selectSess('${s.id}')"><div class="ai-avatar" style="background:#67c23a;font-size:12px">${s.nick[0]}</div><div class="ai-item-info"><div class="ai-item-name">${s.nick}${s.remark?'（'+s.remark+'）':''}</div><div class="ai-item-meta">${s.msg} · ${s.time}</div></div></div>`).join('');
}
function selectSess(id){
  selSess=id;const s=sessions.find(x=>x.id===id);renderSessList();
  document.getElementById('placeholder').classList.add('view-hidden');
  document.getElementById('detail').classList.remove('view-hidden');
  document.getElementById('sess-title').textContent=s.nick+(s.remark?'（'+s.remark+'）':'');
  filter='all';expandedRules.clear();expandedEvals.clear();showEval=true;
  switchTab('tasks');
}
function switchTab(t){
  document.querySelectorAll('.ai-tab').forEach(x=>x.classList.remove('active'));
  ['chat','vars','mirror','tasks'].forEach(x=>document.getElementById('c-'+x).classList.add('view-hidden'));
  if(t==='tasks'){document.getElementById('tab-tasks').classList.add('active');renderTasks();}
  else if(t==='chat')document.querySelectorAll('.ai-tab')[0].classList.add('active');
  else if(t==='vars')document.querySelectorAll('.ai-tab')[1].classList.add('active');
  else document.querySelectorAll('.ai-tab')[2].classList.add('active');
  document.getElementById('c-'+t).classList.remove('view-hidden');
}

function renderTasks(){
  const c=document.getElementById('c-tasks');
  const executed=rules.filter(r=>r.status==='executed').length;
  const pending=rules.filter(r=>r.status==='pending').length;
  const notTriggered=rules.filter(r=>r.status==='not_triggered').length;
  const filtered=filter==='all'?rules:rules.filter(r=>r.status===filter);

  let h=`
  <div class="overview-card">
    <div class="overview-row">
      <span class="overview-label">命中分组</span>
      <span class="overview-value">${matchedGroup.name}</span>
      <span class="tag tag-success">已命中</span>
      ${matchedGroup.isFallback?'<span class="tag tag-fallback">兜底</span>':''}
    </div>
    <div class="overview-row">
      <span class="overview-label">命中原因</span>
      <span style="font-size:13px;color:#606266">${matchedGroup.reason}</span>
    </div>
    <div class="overview-row">
      <span class="overview-label">承接成员</span>
      <span class="member-badge"><span class="dot ${member.online?'online':'offline'}"></span><span class="ai-avatar" style="background:${member.color};width:20px;height:20px;font-size:10px;display:inline-flex">${member.name[0]}</span>${member.name} <span style="color:${member.online?'#67c23a':'#f56c6c'}">${member.online?'在线':'离线'}</span></span>
    </div>
    <div class="overview-row">
      <span class="overview-label">镜像画像</span>
      <span style="font-size:13px">读取自：<span class="mirror-link">${mirrorSource} 的独立镜像画像</span></span>
    </div>
    <div class="overview-row">
      <span class="overview-label">匹配时间</span>
      <span style="font-size:12px;color:#909399">${matchedGroup.matchedAt}</span>
    </div>
  </div>

  <div class="filter-bar">
    <div class="filter-btn ${filter==='all'?'active':''}" onclick="filter='all';renderTasks()">全部 ${rules.length}</div>
    <div class="filter-btn ${filter==='executed'?'active':''}" onclick="filter='executed';renderTasks()">已执行 ${executed}</div>
    <div class="filter-btn ${filter==='pending'?'active':''}" onclick="filter='pending';renderTasks()">待执行 ${pending}</div>
    <div class="filter-btn ${filter==='not_triggered'?'active':''}" onclick="filter='not_triggered';renderTasks()">未触发 ${notTriggered}</div>
    <span class="stats-text">共 ${rules.length} 条规则：已执行 ${executed} / 待执行 ${pending} / 未触发 ${notTriggered}</span>
  </div>`;

  filtered.forEach(r=>{
    const exp=expandedRules.has(r.id);
    const statusTag=r.status==='executed'?'<span class="tag tag-success">已执行</span>':r.status==='pending'?'<span class="tag tag-primary">待执行</span>':'<span class="tag tag-info">未触发</span>';
    let reasonTag='';
    if(r.reason==='condition_not_met')reasonTag='<span class="reason-tag reason-orange">⚠ 条件不满足</span>';
    else if(r.reason==='rule_disabled')reasonTag='<span class="reason-tag reason-gray">⏸ 规则已禁用</span>';
    else if(r.reason==='member_offline')reasonTag='<span class="reason-tag reason-red">📴 成员离线</span>';
    else if(r.reason==='switch_off')reasonTag='<span class="reason-tag reason-gray">🔒 开关已关闭</span>';
    else if(r.reason==='no_member')reasonTag='<span class="reason-tag reason-red">👤 未配置成员</span>';

    let timeText='';
    if(r.status==='executed')timeText=`<span class="rule-time">${r.executedAt}</span>`;
    else if(r.status==='pending')timeText=`<span class="rule-time">预计 ${r.scheduledAt}</span>`;

    h+=`<div class="rule-card">
      <div class="rule-card-header" onclick="toggleRule(${r.id})">
        <div class="rule-left">
          ${statusTag}
          <div class="rule-info"><div class="rule-name">${r.name}</div><div class="rule-desc">${r.desc}</div></div>
        </div>
        <div class="rule-right">
          ${reasonTag} ${timeText}
          <span style="font-size:11px;color:#c0c4cc">${r.type==='scheduled'?'⏰ 定时':'⚡ 变更'}</span>
          <span class="expand-arrow ${exp?'expanded':''}">▼</span>
        </div>
      </div>`;

    if(exp){
      h+='<div class="rule-detail">';
      if(r.status==='executed'){
        h+=`<div style="margin-bottom:10px"><span style="font-size:12px;font-weight:500;color:#67c23a">✅ 执行成功</span><span style="font-size:11px;color:#909399;margin-left:8px">${r.executedAt}</span></div>`;
        if(r.action)h+=`<div style="padding:8px 10px;background:#f0f9eb;border:1px solid #e1f3d8;border-radius:6px;font-size:12px;color:#606266;margin-bottom:8px">📤 ${r.action}</div>`;
        if(r.attrChanges.length>0){
          h+='<div style="font-size:12px;font-weight:500;margin-bottom:6px">属性变更：</div>';
          r.attrChanges.forEach(ac=>{
            h+=`<div style="font-size:12px;padding:4px 0;color:#606266">${ac.field}：<span style="color:#909399">${ac.from}</span> → <span style="color:#409eff;font-weight:500">${ac.to}</span> <span class="cond-mirror">(镜像)</span></div>`;
          });
        }
      } else if(r.status==='pending'){
        h+=`<div style="padding:8px 10px;background:#ecf5ff;border:1px solid #b3d8ff;border-radius:6px;font-size:12px;color:#409eff;margin-bottom:8px">⏳ 等待定时触发，预计 ${r.scheduledAt}</div>`;
      } else {
        if(r.reason==='rule_disabled'){
          h+='<div style="padding:8px 10px;background:#f4f4f5;border:1px solid #d3d4d6;border-radius:6px;font-size:12px;color:#909399;margin-bottom:8px">⏸ 该规则当前为禁用状态，启用后方可触发</div>';
          h+='<div class="suggestion">💡 建议：前往规则引擎配置页面启用该规则</div>';
        } else if(r.reason==='condition_not_met'){
          h+='<div style="font-size:12px;font-weight:500;margin-bottom:6px">触发条件详情：</div>';
          r.conditions.forEach(cd=>{
            h+=`<div class="cond-item ${cd.ok?'ok':'fail'}"><span class="cond-icon">${cd.ok?'✅':'❌'}</span><div class="cond-body"><div class="cond-field">${cd.field}</div><div class="cond-detail">${cd.op}「${cd.expect}」→ 当前值：<strong style="color:${cd.ok?'#67c23a':'#f56c6c'}">${cd.actual}</strong> <span class="cond-mirror">(镜像)</span></div></div></div>`;
          });
          h+='<div class="suggestion">💡 建议：检查镜像画像中相关属性值，或调整规则条件配置</div>';
        } else if(r.reason==='member_offline'){
          h+=`<div style="padding:8px 10px;background:#fef0f0;border:1px solid #fde2e2;border-radius:6px;font-size:12px;color:#f56c6c;margin-bottom:8px">📴 承接成员 ${member.name} 的云手机当前离线，规则暂挂中</div>`;
          h+='<div class="suggestion">💡 建议：检查承接成员的云手机在线状态</div>';
        }
      }
      h+='</div>';
    }
    h+='</div>';
  });

  h+=`<div class="eval-section">
    <div class="eval-title" onclick="showEval=!showEval;renderTasks()">📋 分组评估过程 <span class="expand-arrow ${showEval?'expanded':''}">▼</span></div>`;
  if(showEval){
    evalGroups.forEach(g=>{
      const cls=g.result==='matched'?(g.isFallback?'fallback matched':'matched'):'skipped';
      const resultTag=g.result==='matched'?'<span class="tag tag-success">命中</span>':'<span class="tag tag-info">未命中</span>';
      const expE=expandedEvals.has(g.name);
      h+=`<div class="eval-card ${cls}">
        <div class="eval-header" onclick="toggleEval('${g.name}')">
          <div class="eval-left">
            ${g.isFallback?'<span style="font-size:14px">🛡️</span>':''}
            <span style="font-weight:500;font-size:13px">${g.name}</span>
            ${resultTag}
            ${g.isFallback?'<span class="tag tag-fallback" style="font-size:11px">兜底</span>':''}
          </div>
          <div class="eval-right">
            <span>${g.rules} 条规则</span>
            <span>${g.members} 名成员</span>
            <span style="color:#606266;font-size:12px">${g.reason}</span>
            ${g.conditions.length>0?`<span class="expand-arrow ${expE?'expanded':''}">▼</span>`:''}
          </div>
        </div>`;
      if(expE&&g.conditions.length>0){
        h+='<div style="padding:8px 14px 12px;border-top:1px solid #f0f0f0">';
        g.conditions.forEach(cd=>{
          h+=`<div class="cond-item ${cd.ok?'ok':'fail'}"><span class="cond-icon">${cd.ok?'✅':'❌'}</span><div class="cond-body"><div class="cond-field">${cd.field}</div><div class="cond-detail">${cd.op}「${cd.expect}」→ 当前值：<strong style="color:${cd.ok?'#67c23a':'#f56c6c'}">${cd.actual}</strong> <span class="cond-mirror">(镜像)</span></div></div></div>`;
        });
        h+='</div>';
      }
      h+='</div>';
    });
  }
  h+='</div>';
  c.innerHTML=h;
}

function toggleRule(id){if(expandedRules.has(id))expandedRules.delete(id);else expandedRules.add(id);renderTasks();}
function toggleEval(name){if(expandedEvals.has(name))expandedEvals.delete(name);else expandedEvals.add(name);renderTasks();}

renderEmpList();renderSessList();
</script>
</body>
</html>
