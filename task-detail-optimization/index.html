  {id:908,name:'扣子 - 课程推荐应答',desc:'调用扣子智能体推荐适合课程',type:'user_change',status:'not_triggered',reason:'coze_fail',reasonText:'扣子返回异常',
   actionType:'coze',cozeError:{code:504,msg:'Coze 调用超时（>30s）',botId:'bot_7395a2'}},
  {id:909,name:'会员开通引导',desc:'未开通会员的用户推送开通引导',type:'user_change',status:'not_triggered',reason:'rule_disabled',reasonText:'规则已禁用',actionType:'msg'},
  {id:911,name:'购买用户感谢消息',desc:'购买次数大于 0 的用户发送感谢',type:'user_change',status:'not_triggered',reason:'condition_not_met',reasonText:'条件不满足',
   actionType:'msg',conditions:[{field:'购买次数',op:'大于',expect:'0',actual:'0',ok:false}]}
];

const evalGroups=[
  {name:'新用户引导分组',result:'not_matched',reason:'注册天数=15，不满足"< 7"',rules:2,members:2,conditions:[{field:'注册天数',op:'小于',expect:'7',actual:'15',ok:false}]},
  {name:'高意向用户维护分组',result:'matched',reason:'私域分层=B 且 最近活跃天数=2 < 7',rules:11,members:3,conditions:[{field:'私域分层',op:'等于',expect:'B',actual:'B',ok:true},{field:'最近活跃天数',op:'小于',expect:'7',actual:'2',ok:true}]},
  {name:'抖音渠道用户分组',result:'skipped',reason:'已有更高优先级分组命中',rules:2,members:0,conditions:[]},
  {name:'通用兜底分组',result:'skipped',isFallback:true,reason:'已有普通分组命中，兜底未参与',rules:6,members:1,conditions:[]}
];

let selEmp='e1',selSess=null,filter='all',expandedRules=new Set(),expandedEvals=new Set(),showEval=true;

function tierBadge(level,opts={}){
  const map={A:'A 类 高意向',B:'B 类 中意向',C:'C 类 低意向',D:'D 类 无意向'};
  return `<span class="tier-badge tier-${level}" onclick="toast('已跳转「私域用户分层」详情页')">⭐ ${map[level]}${opts.recent?'<span class="tier-dot" title="近 24h 内变更"></span>':''}</span>`;
}
function modeBadge(){
  if(channelMode.type==='coze')return `<span class="mode-badge">🤖 扣子智能体接待</span>`;
  if(channelMode.type==='rag')return `<span class="mode-badge mode-rag">🧠 AI 应答 (RAG)</span>`;
  return `<span class="mode-badge mode-match">🔍 匹配应答</span>`;
}
function verifyBadge(){
  const map={pass:['verify-pass','✅ 核验已通过 ('+verify.phone+')'],wait:['verify-wait','⏳ 等待用户输入验证码'],fail:['verify-fail','❌ 核验失败'],expire:['verify-expire','⌛ 核验已过期'],none:['verify-none','— 未发起核验']};
  const [cls,txt]=map[verify.status]||map.none;
  return `<span class="verify-badge ${cls}" onclick="toast('已跳转聊天记录中对应的核验卡片')">${txt}${verify.status==='pass'?' · '+verify.time:''}</span>`;
}
function tierMini(level){return `<span class="tier-mini tier-${level}">${level}</span>`;}
function actionTag(t){
  const map={
    msg:['action-msg','💬 发送消息'],
    coze:['','🤖 调用扣子'],
    summary:['action-summary','🧠 生成总结'],
    fanout:['action-fanout','📡 多端联动推送'],
    tier:['action-tier','⭐ 更新分层'],
    attr:['action-attr','📝 更新属性']
  };
  const [cls,txt]=map[t]||['',''];
  return `<span class="action-tag ${cls}">${txt}</span>`;
}

function renderEmpList(){
  document.getElementById('emp-list').innerHTML=emps.map(e=>`<div class="ai-list-item ${e.id===selEmp?'active':''}" onclick="selEmp='${e.id}';renderEmpList();renderSessList()"><div class="ai-avatar" style="background:${e.color}">${e.avatar}</div><div class="ai-item-info"><div class="ai-item-name">${e.name}</div></div></div>`).join('');
}
function renderSessList(){
  document.getElementById('sess-list').innerHTML=sessions.map(s=>`<div class="ai-list-item ${s.id===selSess?'active':''}" onclick="selectSess('${s.id}')"><div class="ai-avatar" style="background:#67c23a;font-size:12px">${s.nick[0]}</div><div class="ai-item-info"><div class="ai-item-name">${s.nick}${s.remark?'（'+s.remark+'）':''} ${tierMini(s.tier)}</div><div class="ai-item-meta">${s.msg} · ${s.time}</div></div></div>`).join('');
}
function selectSess(id){
  selSess=id;const s=sessions.find(x=>x.id===id);renderSessList();
  document.getElementById('placeholder').classList.add('view-hidden');
  document.getElementById('detail').classList.remove('view-hidden');
  document.getElementById('sess-title').textContent=s.nick+(s.remark?'（'+s.remark+'）':'');
  document.getElementById('sess-tier-summary').innerHTML='分层 '+tierMini(s.tier)+' · 应答模式：'+(channelMode.type==='coze'?'扣子智能体':'AI 应答');
  filter='all';expandedRules.clear();expandedEvals.clear();showEval=true;
  switchTab('tasks');
}
function switchTab(t){
  document.querySelectorAll('.ai-tab').forEach(x=>x.classList.remove('active'));
  ['chat','vars','mirror','summary','tasks'].forEach(x=>document.getElementById('c-'+x).classList.add('view-hidden'));
  if(t==='tasks'){document.getElementById('tab-tasks').classList.add('active');renderTasks();}
  else{
    const idx={chat:0,vars:1,mirror:2,summary:3}[t];
    document.querySelectorAll('.ai-tab')[idx].classList.add('active');
  }
  document.getElementById('c-'+t).classList.remove('view-hidden');
}

function renderTasks(){
  const c=document.getElementById('c-tasks');
  const executed=rules.filter(r=>r.status==='executed').length;
  const pending=rules.filter(r=>r.status==='pending').length;
  const notTriggered=rules.filter(r=>r.status==='not_triggered').length;
  const filtered=filter==='all'?rules:rules.filter(r=>r.status===filter);

  let h=`
  <div class="overview-card">
    <div class="overview-row">
      <span class="overview-label">命中分组</span>
      <span class="overview-value">${matchedGroup.name}</span>
      <span class="tag tag-success">已命中</span>
      ${matchedGroup.isFallback?'<span class="tag tag-fallback">兜底</span>':''}
    </div>
    <div class="overview-row">
      <span class="overview-label">命中原因</span>
      <span style="font-size:13px;color:#606266">${matchedGroup.reason}</span>
    </div>
    <div class="overview-row">
      <span class="overview-label">承接成员</span>
      <span class="member-badge"><span class="dot ${member.online?'online':'offline'}"></span><span class="ai-avatar" style="background:${member.color};width:20px;height:20px;font-size:10px;display:inline-flex">${member.name[0]}</span>${member.name} <span style="color:${member.online?'#67c23a':'#f56c6c'}">${member.online?'在线':'离线'}</span></span>
      <span class="overview-label" style="margin-left:24px">镜像画像</span>
      <span style="font-size:13px">读取自：<span class="mirror-link">${mirrorSource} 的独立镜像画像</span></span>
    </div>
    <div class="overview-row" style="padding-top:6px;border-top:1px dashed #d9ecff;margin-top:4px">
      <span class="overview-label">🆕 私域分层</span>
      ${tierBadge(tier.level,{recent:tier.changedRecent})}
      <span style="font-size:11px;color:#909399">上次计算 ${tier.lastCalc}${tier.changedRecent?' · 24h 内由 '+tier.from+'→'+tier.to+'（'+tier.changedAt+'）':''}</span>
    </div>
    <div class="overview-row">
      <span class="overview-label">🆕 应答模式</span>
      ${modeBadge()}
      ${channelMode.type==='coze'?`<span style="font-size:11px;color:#909399">BOT ID: <code style="background:#fff;padding:1px 4px;border-radius:3px">${channelMode.botId.slice(0,6)}****</code> · 流式 ${channelMode.stream?'开':'关'} · 上次调用 ${channelMode.lastCallMs}ms</span>`:''}
    </div>
    <div class="overview-row">
      <span class="overview-label">🆕 身份核验</span>
      ${verifyBadge()}
    </div>
    <div class="overview-row" style="font-size:11px;color:#909399">
      <span class="overview-label">匹配时间</span>${matchedGroup.matchedAt}
    </div>
  </div>

  <div class="filter-bar">
    <div class="filter-btn ${filter==='all'?'active':''}" onclick="filter='all';renderTasks()">全部 ${rules.length}</div>
    <div class="filter-btn ${filter==='executed'?'active':''}" onclick="filter='executed';renderTasks()">已执行 ${executed}</div>
    <div class="filter-btn ${filter==='pending'?'active':''}" onclick="filter='pending';renderTasks()">待执行 ${pending}</div>
    <div class="filter-btn ${filter==='not_triggered'?'active':''}" onclick="filter='not_triggered';renderTasks()">未触发 ${notTriggered}</div>
    <span class="stats-text">共 ${rules.length} 条规则：已执行 ${executed} / 待执行 ${pending} / 未触发 ${notTriggered}</span>
  </div>`;

  filtered.forEach(r=>{
    const exp=expandedRules.has(r.id);
    const statusTag=r.status==='executed'?'<span class="tag tag-success">已执行</span>':r.status==='pending'?'<span class="tag tag-primary">待执行</span>':'<span class="tag tag-info">未触发</span>';
    let reasonTag='';
    if(r.reason==='condition_not_met')reasonTag='<span class="reason-tag reason-orange">⚠ 条件不满足</span>';
    else if(r.reason==='rule_disabled')reasonTag='<span class="reason-tag reason-gray">⏸ 规则已禁用</span>';
    else if(r.reason==='member_offline')reasonTag='<span class="reason-tag reason-red">📴 成员离线</span>';
    else if(r.reason==='verify_wait')reasonTag='<span class="reason-tag reason-blue">🔐 等待身份核验</span>';
    else if(r.reason==='verify_fail')reasonTag='<span class="reason-tag reason-red">🚫 核验未通过</span>';
    else if(r.reason==='mode_mismatch')reasonTag='<span class="reason-tag reason-gray">🔀 模式不匹配</span>';
    else if(r.reason==='coze_fail')reasonTag='<span class="reason-tag reason-red">🤖 扣子返回异常</span>';
    else if(r.reason==='tier_mismatch')reasonTag='<span class="reason-tag reason-orange">⭐ 分层不匹配</span>';

    let timeText='';
    if(r.status==='executed')timeText=`<span class="rule-time">${r.executedAt}</span>`;
    else if(r.status==='pending')timeText=`<span class="rule-time">预计 ${r.scheduledAt}</span>`;

    const tierTag=r.applyTiers?r.applyTiers.map(tierMini).join(''):'';
    const verifyMark=r.requireVerify?'<span class="reason-tag reason-blue">🔐 需核验</span>':'';

    h+=`<div class="rule-card">
      <div class="rule-card-header" onclick="toggleRule(${r.id})">
        <div class="rule-left">
          ${statusTag}
          <div class="rule-info">
            <div class="rule-name">${r.name} ${tierTag?'<span style="font-size:10px;color:#909399">适用：</span>'+tierTag:''}</div>
            <div class="rule-desc">${r.desc}</div>
          </div>
        </div>
        <div class="rule-right">
          ${actionTag(r.actionType)}
          ${verifyMark}
          ${reasonTag} ${timeText}
          <span style="font-size:11px;color:#c0c4cc">${r.type==='scheduled'?'⏰ 定时':r.type==='handoff'?'🆘 转人工':r.type==='tier_change'?'⭐ 分层变更':'⚡ 变更'}</span>
          <span class="expand-arrow ${exp?'expanded':''}">▼</span>
        </div>
      </div>`;

    if(exp){
      h+='<div class="rule-detail">';
      if(r.status==='executed'){
        h+=`<div style="margin-bottom:8px"><span style="font-size:12px;font-weight:500;color:#67c23a">✅ 执行成功</span><span style="font-size:11px;color:#909399;margin-left:8px">${r.executedAt}</span></div>`;
        if(r.action)h+=`<div style="padding:8px 10px;background:#f0f9eb;border:1px solid #e1f3d8;border-radius:6px;font-size:12px;color:#606266;margin-bottom:8px">📤 ${r.action}</div>`;
        if(r.cozeIO){
          h+=`<div class="section-title">扣子调用 IO</div>
          <div class="coze-config"><div>📥 输入：${r.cozeIO.input}</div><div style="margin-top:4px">📤 输出：${r.cozeIO.output}</div><div style="margin-top:4px;color:#909399">BOT_ID: <code>${channelMode.botId}</code> · stream=${channelMode.stream} · timeout=${channelMode.timeout}s</div></div>`;
        }
        if(r.fanout){
          h+=`<div class="section-title">🆕 多系统联动追踪</div>
          <div class="fanout-panel">`;
          r.fanout.forEach((f,i)=>{
            h+=`<div class="fanout-card ${f.status}">
              <div class="fanout-title">${f.icon} ${f.ch}<span class="fanout-status ${f.status}">${f.status==='ok'?'成功':f.status==='fail'?'失败':'处理中'}</span></div>
              <div class="fanout-meta">${f.meta}${f.preview?'<div style="margin-top:4px;padding:6px 8px;background:#fafbfc;border-radius:4px;font-style:italic">📝 '+f.preview+'</div>':''}</div>
              ${i<r.fanout.length-1?'<span class="fanout-arrow">›</span>':''}
            </div>`;
          });
          h+='</div>';
        }
        if(r.tierChange){
          h+=`<div class="section-title">🆕 分层变更</div>
          <div class="tier-change">${tierMini(r.tierChange.from)} <span style="color:#909399">→</span> ${tierMini(r.tierChange.to)}
          <span style="margin-left:8px">企微「私域线索分层」标签组同步：<span style="color:${r.tierChange.syncStatus==='ok'?'#67c23a':'#f56c6c'};font-weight:500">${r.tierChange.syncStatus==='ok'?'✅ 已同步':'❌ 同步失败'}</span>（${r.tierChange.syncAt}）</span></div>`;
        }
        if(r.attrChanges&&r.attrChanges.length>0){
          h+='<div class="section-title">属性变更</div>';
          r.attrChanges.forEach(ac=>{
            h+=`<div style="font-size:12px;padding:4px 0;color:#606266">${ac.field}：<span style="color:#909399">${ac.from}</span> → <span style="color:#409eff;font-weight:500">${ac.to}</span> <span class="cond-mirror">(镜像)</span></div>`;
          });
        }
      } else if(r.status==='pending'){
        h+=`<div style="padding:8px 10px;background:#ecf5ff;border:1px solid #b3d8ff;border-radius:6px;font-size:12px;color:#409eff">⏳ 等待定时触发，预计 ${r.scheduledAt}</div>`;
      } else {
        if(r.reason==='rule_disabled'){
          h+='<div style="padding:8px 10px;background:#f4f4f5;border:1px solid #d3d4d6;border-radius:6px;font-size:12px;color:#909399">⏸ 该规则当前为禁用状态，启用后方可触发</div>';
          h+='<div class="suggestion">💡 建议：前往规则引擎配置页面启用该规则</div>';
        } else if(r.reason==='condition_not_met'){
          h+='<div class="section-title">触发条件详情</div>';
          r.conditions.forEach(cd=>{
            h+=`<div class="cond-item ${cd.ok?'ok':'fail'}"><span class="cond-icon">${cd.ok?'✅':'❌'}</span><div class="cond-body"><div class="cond-field">${cd.field}</div><div class="cond-detail">${cd.op}「${cd.expect}」→ 当前值：<strong style="color:${cd.ok?'#67c23a':'#f56c6c'}">${cd.actual}</strong> <span class="cond-mirror">(镜像)</span></div></div></div>`;
          });
          h+='<div class="suggestion">💡 建议：检查镜像画像中相关属性值，或调整规则条件配置</div>';
        } else if(r.reason==='verify_wait'){
          h+=`<div style="padding:8px 10px;background:#ecf5ff;border:1px solid #b3d8ff;border-radius:6px;font-size:12px;color:#409eff">🔐 该规则涉及敏感操作，需用户完成短信验证码核验后方可执行。<br>当前核验状态：<strong>${verify.status==='pass'?'已通过':verify.status==='wait'?'待用户输入':verify.status==='expire'?'已过期':'未发起'}</strong></div>`;
          h+='<div class="suggestion">💡 建议：在聊天对话中向用户发起验证卡片，或前往身份核验记录排查</div>';
          h+=`<div style="margin-top:6px"><button class="btn btn-sm btn-primary" onclick="toast('已向用户发送验证卡片（仅原型演示）')">🔄 发起核验卡片</button></div>`;
        } else if(r.reason==='mode_mismatch'){
          h+=`<div style="padding:8px 10px;background:#f4f4f5;border:1px solid #d3d4d6;border-radius:6px;font-size:12px;color:#606266">🔀 该规则要求渠道应答模式为 <strong>${r.requireMode==='rag'?'AI 应答 (RAG)':'扣子智能体'}</strong>，当前渠道模式为 <strong>${channelMode.label}</strong>，已跳过</div>`;
          h+='<div class="suggestion">💡 建议：前往「渠道管理」调整应答模式，或将该规则迁移到适配的分组</div>';
        } else if(r.reason==='coze_fail'){
          h+=`<div style="padding:8px 10px;background:#fef0f0;border:1px solid #fde2e2;border-radius:6px;font-size:12px;color:#f56c6c">🤖 调用扣子智能体失败<br>BOT_ID: <code>${r.cozeError.botId}</code> · 错误码: <strong>${r.cozeError.code}</strong> · ${r.cozeError.msg}</div>`;
          h+='<div class="suggestion">💡 建议：前往「渠道管理 → 扣子智能体接待」检查 BOT_ID / Token / 超时配置，或联系扣子平台</div>';
        } else if(r.reason==='tier_mismatch'){
          h+=`<div class="tier-change">规则限定：${tierMini(r.mismatchTier.rule)} 类用户 · 当前用户：${tierMini(r.mismatchTier.user)} 类<span style="margin-left:auto;color:#909399">最近一次分层计算 ${tier.lastCalc}</span></div>`;
          h+='<div class="suggestion">💡 建议：等待下一次分层计算周期；如需立即生效可前往「私域用户分层 → 分层配置」手动重算或调整判定条件</div>';
        }
      }
      h+='</div>';
    }
    h+='</div>';
  });

  h+=`<div class="eval-section">
    <div class="eval-title" onclick="showEval=!showEval;renderTasks()">📋 分组评估过程 <span class="expand-arrow ${showEval?'expanded':''}">▼</span></div>`;
  if(showEval){
    evalGroups.forEach(g=>{
      const cls=g.result==='matched'?(g.isFallback?'fallback matched':'matched'):'skipped';
      const resultTag=g.result==='matched'?'<span class="tag tag-success">命中</span>':g.result==='skipped'?'<span class="tag tag-info">跳过</span>':'<span class="tag tag-info">未命中</span>';
      const expE=expandedEvals.has(g.name);
      h+=`<div class="eval-card ${cls}">
        <div class="eval-header" onclick="toggleEval('${g.name}')">
          <div class="eval-left">
            ${g.isFallback?'<span style="font-size:14px">🛡️</span>':''}
            <span style="font-weight:500;font-size:13px">${g.name}</span>
            ${resultTag}
            ${g.isFallback?'<span class="tag tag-fallback" style="font-size:11px">兜底</span>':''}
          </div>
          <div class="eval-right">
            <span>${g.rules} 条规则</span>
            <span>${g.members} 名成员</span>
            <span style="color:#606266;font-size:12px">${g.reason}</span>
            ${g.conditions.length>0?`<span class="expand-arrow ${expE?'expanded':''}">▼</span>`:''}
          </div>
        </div>`;
      if(expE&&g.conditions.length>0){
        h+='<div style="padding:8px 14px 12px;border-top:1px solid #f0f0f0">';
        g.conditions.forEach(cd=>{
          h+=`<div class="cond-item ${cd.ok?'ok':'fail'}"><span class="cond-icon">${cd.ok?'✅':'❌'}</span><div class="cond-body"><div class="cond-field">${cd.field}</div><div class="cond-detail">${cd.op}「${cd.expect}」→ 当前值：<strong style="color:${cd.ok?'#67c23a':'#f56c6c'}">${cd.actual}</strong> <span class="cond-mirror">(镜像)</span></div></div></div>`;
        });
        h+='</div>';
      }
      h+='</div>';
    });
  }
  h+='</div>';
  c.innerHTML=h;
}

function toggleRule(id){if(expandedRules.has(id))expandedRules.delete(id);else expandedRules.add(id);renderTasks();}
function toggleEval(name){if(expandedEvals.has(name))expandedEvals.delete(name);else expandedEvals.add(name);renderTasks();}
function toast(msg){const t=document.createElement('div');t.className='toast toast-info';t.textContent=msg;document.body.appendChild(t);setTimeout(()=>t.remove(),2000);}

renderEmpList();renderSessList();
// 默认展开几个关键规则演示新能力
selectSess('s1');
expandedRules.add(902);expandedRules.add(910);expandedRules.add(907);expandedRules.add(908);expandedRules.add(905);renderTasks();
</script>
</body>
</html>
